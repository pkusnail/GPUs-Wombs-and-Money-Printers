<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <!-- Background -->
  <rect width="1200" height="800" fill="#0A0A0A"/>

  <!-- ARROW DEFINITIONS -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555555"/>
    </marker>
  </defs>

  <!-- ====== TITLE ====== -->
  <text x="600" y="38" fill="#FFFFFF" font-family="sans-serif" font-size="26" font-weight="bold" text-anchor="middle">学位贬值的连锁反应</text>

  <!-- ====== ROW 1: TRIGGER ====== -->
  <rect x="440" y="80" width="320" height="60" rx="12" fill="none" stroke="#FF4444" stroke-width="2"/>
  <rect x="440" y="80" width="320" height="60" rx="12" fill="#FF4444" fill-opacity="0.12"/>
  <text x="600" y="107" fill="#FF4444" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">AI替代入门岗位</text>

  <!-- Arrow: Row1 -> Row2 Left -->
  <line x1="520" y1="140" x2="340" y2="180" stroke="#555555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- Arrow: Row1 -> Row2 Right -->
  <line x1="680" y1="140" x2="860" y2="180" stroke="#555555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ====== ROW 2: IMMEDIATE EFFECTS ====== -->
  <!-- Left: Degree ROI -->
  <rect x="150" y="185" width="340" height="72" rx="10" fill="none" stroke="#FF9800" stroke-width="2"/>
  <rect x="150" y="185" width="340" height="72" rx="10" fill="#FF9800" fill-opacity="0.10"/>
  <text x="320" y="212" fill="#FF9800" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">学位ROI暴跌</text>
  <text x="320" y="249" fill="#FFFFFF" font-family="sans-serif" font-size="13" text-anchor="middle">63% 美国人认为不值</text>

  <!-- Right: CS Enrollment -->
  <rect x="710" y="185" width="340" height="72" rx="10" fill="none" stroke="#FF9800" stroke-width="2"/>
  <rect x="710" y="185" width="340" height="72" rx="10" fill="#FF9800" fill-opacity="0.10"/>
  <text x="880" y="212" fill="#FF9800" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">CS注册下降15%</text>
  <text x="880" y="249" fill="#FFFFFF" font-family="sans-serif" font-size="13" text-anchor="middle">20年来首次逆转</text>

  <!-- Arrow: Row2 Left -> Row3 Left -->
  <line x1="320" y1="257" x2="320" y2="300" stroke="#555555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- Arrow: Row2 Right -> Row3 Right -->
  <line x1="880" y1="257" x2="880" y2="300" stroke="#555555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ====== ROW 3: UNIVERSITY CRISIS ====== -->
  <!-- Left: University Closures -->
  <rect x="150" y="305" width="340" height="72" rx="10" fill="none" stroke="#FF4444" stroke-width="2"/>
  <rect x="150" y="305" width="340" height="72" rx="10" fill="#FF4444" fill-opacity="0.10"/>
  <text x="320" y="332" fill="#FF4444" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">大学关门潮</text>
  <text x="320" y="369" fill="#FFFFFF" font-family="sans-serif" font-size="13" text-anchor="middle">2024年关闭28所</text>

  <!-- Right: International Student Exodus -->
  <rect x="710" y="305" width="340" height="72" rx="10" fill="none" stroke="#FF4444" stroke-width="2"/>
  <rect x="710" y="305" width="340" height="72" rx="10" fill="#FF4444" fill-opacity="0.10"/>
  <text x="880" y="332" fill="#FF4444" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">留学生退潮</text>
  <text x="880" y="369" fill="#FFFFFF" font-family="sans-serif" font-size="13" text-anchor="middle">加拿大学签 -48%</text>

  <!-- Arrow: Row3 Left -> Row4 -->
  <line x1="400" y1="377" x2="520" y2="420" stroke="#555555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- Arrow: Row3 Right -> Row4 -->
  <line x1="800" y1="377" x2="680" y2="420" stroke="#555555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ====== ROW 4: CITY IMPACT ====== -->
  <rect x="280" y="425" width="640" height="90" rx="12" fill="none" stroke="#FF4444" stroke-width="2"/>
  <rect x="280" y="425" width="640" height="90" rx="12" fill="#FF4444" fill-opacity="0.08"/>
  <text x="600" y="452" fill="#FF4444" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">留学依赖型城市遭受双重打击</text>

  <!-- City data pills -->
  <rect x="320" y="482" width="110" height="24" rx="12" fill="#FF4444" fill-opacity="0.20"/>
  <text x="375" y="498" fill="#FFFFFF" font-family="sans-serif" font-size="12" text-anchor="middle">Sydney 47%</text>

  <rect x="445" y="482" width="110" height="24" rx="12" fill="#FF4444" fill-opacity="0.20"/>
  <text x="500" y="498" fill="#FFFFFF" font-family="sans-serif" font-size="12" text-anchor="middle">London 20%</text>

  <rect x="570" y="482" width="100" height="24" rx="12" fill="#FF4444" fill-opacity="0.20"/>
  <text x="620" y="498" fill="#FFFFFF" font-family="sans-serif" font-size="12" text-anchor="middle">Toronto</text>

  <rect x="685" y="482" width="110" height="24" rx="12" fill="#FF4444" fill-opacity="0.20"/>
  <text x="740" y="498" fill="#FFFFFF" font-family="sans-serif" font-size="12" text-anchor="middle">Melbourne</text>

  <!-- Arrows: Row4 -> Row5 (three branches) -->
  <line x1="460" y1="515" x2="240" y2="565" stroke="#555555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="600" y1="515" x2="600" y2="565" stroke="#555555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="740" y1="515" x2="960" y2="565" stroke="#555555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ====== ROW 5: EDUCATION TRANSFORMATION ====== -->
  <!-- Left: Micro-credentials -->
  <rect x="80" y="570" width="310" height="68" rx="10" fill="none" stroke="#00BCD4" stroke-width="2"/>
  <rect x="80" y="570" width="310" height="68" rx="10" fill="#00BCD4" fill-opacity="0.10"/>
  <text x="235" y="597" fill="#00BCD4" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">微证书 / 堆叠学位</text>

  <!-- Center: Lifelong Learning -->
  <rect x="430" y="570" width="340" height="68" rx="10" fill="none" stroke="#00BCD4" stroke-width="2"/>
  <rect x="430" y="570" width="340" height="68" rx="10" fill="#00BCD4" fill-opacity="0.10"/>
  <text x="600" y="597" fill="#00BCD4" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">终身学习账户</text>

  <!-- Right: AI-native Education -->
  <rect x="810" y="570" width="310" height="68" rx="10" fill="none" stroke="#00BCD4" stroke-width="2"/>
  <rect x="810" y="570" width="310" height="68" rx="10" fill="#00BCD4" fill-opacity="0.10"/>
  <text x="965" y="597" fill="#00BCD4" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">AI原生教学</text>

  <!-- Arrows: Row5 -> Bottom insight -->
  <line x1="235" y1="638" x2="430" y2="685" stroke="#555555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="600" y1="638" x2="600" y2="685" stroke="#555555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="965" y1="638" x2="770" y2="685" stroke="#555555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ====== BOTTOM INSIGHT BOX ====== -->
  <rect x="200" y="690" width="800" height="72" rx="12" fill="none" stroke="#FF9800" stroke-width="2.5"/>
  <rect x="200" y="690" width="800" height="72" rx="12" fill="#FF9800" fill-opacity="0.06"/>
  <text x="600" y="720" fill="#FFFFFF" font-family="sans-serif" font-size="17" font-weight="bold" text-anchor="middle">教育从"一次性4年投入"变成"终身订阅式"</text>

</svg>
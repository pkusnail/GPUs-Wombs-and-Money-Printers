<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <marker id="arrDown" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF9800"/>
    </marker>
  </defs>
  <rect width="1200" height="800" fill="#0A0A0A"/>

  <!-- Title -->
  <text x="600" y="55" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="28" font-weight="bold">印度四层冲击链</text>

  <!-- Layer 1 -->
  <rect x="200" y="130" width="800" height="100" rx="12" fill="#2196F3" fill-opacity="0.15" stroke="#2196F3" stroke-width="2"/>
  <text x="130" y="170" text-anchor="middle" fill="#2196F3" font-family="sans-serif" font-size="24" font-weight="bold">L1</text>
  <text x="600" y="165" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="20" font-weight="bold">IT服务出口崩溃</text>
  <text x="600" y="215" text-anchor="middle" fill="#2196F3" font-family="sans-serif" font-size="12">TCS · Infosys · Wipro — 唯一优势是廉价劳动力</text>

  <!-- Arrow 1→2 -->
  <line x1="600" y1="235" x2="600" y2="265" stroke="#FF9800" stroke-width="2" marker-end="url(#arrDown)"/>

  <!-- Layer 2 -->
  <rect x="200" y="275" width="800" height="100" rx="12" fill="#00BCD4" fill-opacity="0.15" stroke="#00BCD4" stroke-width="2"/>
  <text x="130" y="315" text-anchor="middle" fill="#00BCD4" font-family="sans-serif" font-size="24" font-weight="bold">L2</text>
  <text x="600" y="310" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="20" font-weight="bold">城市生态系统崩溃</text>
  <text x="600" y="360" text-anchor="middle" fill="#00BCD4" font-family="sans-serif" font-size="12">班加罗尔 · 海德拉巴 · 浦那 — IT崩溃→房产→消费→财政 全链断裂</text>

  <!-- Arrow 2→3 -->
  <line x1="600" y1="380" x2="600" y2="410" stroke="#FF9800" stroke-width="2" marker-end="url(#arrDown)"/>

  <!-- Layer 3 -->
  <rect x="200" y="420" width="800" height="100" rx="12" fill="#FF9800" fill-opacity="0.15" stroke="#FF9800" stroke-width="2"/>
  <text x="130" y="460" text-anchor="middle" fill="#FF9800" font-family="sans-serif" font-size="24" font-weight="bold">L3</text>
  <text x="600" y="455" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="20" font-weight="bold">移民链断裂</text>
  <text x="600" y="505" text-anchor="middle" fill="#FF9800" font-family="sans-serif" font-size="12">IIT→TCS→H-1B→硅谷$200K→绿卡 — 这条精英通道永久关闭</text>

  <!-- Arrow 3→4 -->
  <line x1="600" y1="525" x2="600" y2="555" stroke="#FF9800" stroke-width="2" marker-end="url(#arrDown)"/>

  <!-- Layer 4 -->
  <rect x="200" y="565" width="800" height="100" rx="12" fill="#FF4444" fill-opacity="0.15" stroke="#FF4444" stroke-width="2"/>
  <text x="130" y="605" text-anchor="middle" fill="#FF4444" font-family="sans-serif" font-size="24" font-weight="bold">L4</text>
  <text x="600" y="600" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="20" font-weight="bold">美国人才断供</text>
  <text x="600" y="650" text-anchor="middle" fill="#FF4444" font-family="sans-serif" font-size="12">30年来印度/中国/东欧工程师驱动硅谷创新 → 高技能移民停止 → 美国面临日本式停滞</text>

  <!-- Side annotation: cascade acceleration -->
  <text x="1080" y="400" text-anchor="middle" fill="#FF9800" font-family="sans-serif" font-size="14" transform="rotate(90,1080,400)">冲击逐层放大</text>

  <!-- Bottom -->
  <text x="600" y="735" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="14">AI代码代理的边际成本 ≈ 电费</text>
</svg>
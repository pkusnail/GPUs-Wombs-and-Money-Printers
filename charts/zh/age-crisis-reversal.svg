<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <rect width="1200" height="800" fill="#0A0A0A"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="26" font-weight="bold">35岁危机的翻转：AI偏爱谁？</text>

  <!-- Before vs After -->
  <text x="300" y="125" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="20" font-weight="bold">AI之前</text>
  <text x="900" y="125" text-anchor="middle" fill="#FF4444" font-family="sans-serif" font-size="20" font-weight="bold">AI之后</text>

  <!-- Before box -->
  <rect x="80" y="145" width="440" height="130" rx="10" fill="#888888" fill-opacity="0.06" stroke="#888888" stroke-width="1"/>
  <text x="300" y="178" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="16" font-weight="bold">35岁危机</text>
  <text x="110" y="205" fill="#888888" font-family="sans-serif" font-size="13">年轻人: 便宜、能加班、可替代 → 被偏好</text>
  <text x="110" y="230" fill="#FF9800" font-family="sans-serif" font-size="13">资深员工: 贵、不好管理 → 35岁被淘汰</text>
  <text x="110" y="260" fill="#888888" font-family="sans-serif" font-size="11">企业逻辑: 3个初级 = 1个资深，但更便宜</text>

  <!-- Arrow -->
  <text x="570" y="210" fill="#FF9800" font-family="sans-serif" font-size="40">→</text>

  <!-- After box -->
  <rect x="660" y="145" width="460" height="130" rx="10" fill="#FF4444" fill-opacity="0.08" stroke="#FF4444" stroke-width="1.5"/>
  <text x="890" y="178" text-anchor="middle" fill="#FF4444" font-family="sans-serif" font-size="16" font-weight="bold">25岁危机</text>
  <text x="690" y="205" fill="#00BCD4" font-family="sans-serif" font-size="13">资深+AI: 1人产出 = 原来1资深+3初级 → 更被需要</text>
  <text x="690" y="230" fill="#FF4444" font-family="sans-serif" font-size="13">初级员工: AI能做他们的工作 → 进不了门</text>
  <text x="690" y="260" fill="#888888" font-family="sans-serif" font-size="11">企业逻辑: 1个资深+AI &gt; 1个资深+3个初级</text>

  <!-- Harvard Study -->
  <rect x="80" y="295" width="1040" height="65" rx="10" fill="#2196F3" fill-opacity="0.08" stroke="#2196F3" stroke-width="1.5"/>
  <text x="100" y="322" fill="#2196F3" font-family="sans-serif" font-size="15" font-weight="bold">哈佛研究 Harvard Study (2025): 6200万工人 · 28.5万家企业</text>
  <text x="100" y="348" fill="#FFFFFF" font-family="sans-serif" font-size="13">采用AI的企业: <tspan fill="#FF4444" font-weight="bold">初级岗位招聘↓ 7.7-10%</tspan> (6个季度内) · <tspan fill="#00BCD4" font-weight="bold">资深岗位: 几乎不变</tspan></text>

  <!-- Data columns -->
  <text x="350" y="395" text-anchor="middle" fill="#FF4444" font-family="sans-serif" font-size="18" font-weight="bold">入门级招聘暴跌</text>

  <!-- Bars -->
  <text x="100" y="435" fill="#FFFFFF" font-family="sans-serif" font-size="13">美国大厂应届生招聘</text>
  <rect x="350" y="420" width="250" height="22" rx="4" fill="#FF4444" opacity="0.7"/>
  <text x="610" y="437" fill="#FF4444" font-family="sans-serif" font-size="13" font-weight="bold">↓ 50%+ (2019→2024)</text>

  <text x="100" y="465" fill="#FFFFFF" font-family="sans-serif" font-size="13">美国入门级职位发布</text>
  <rect x="350" y="450" width="175" height="22" rx="4" fill="#FF9800" opacity="0.7"/>
  <text x="535" y="467" fill="#FF9800" font-family="sans-serif" font-size="13" font-weight="bold">↓ 35% (2023→2025)</text>

  <text x="100" y="495" fill="#FFFFFF" font-family="sans-serif" font-size="13">500强实习岗(科技)</text>
  <rect x="350" y="480" width="170" height="22" rx="4" fill="#FF9800" opacity="0.6"/>
  <text x="530" y="497" fill="#FF9800" font-family="sans-serif" font-size="13" font-weight="bold">↓ 34% (2022→2024)</text>

  <text x="100" y="525" fill="#FFFFFF" font-family="sans-serif" font-size="13">英国科技毕业生岗位</text>
  <rect x="350" y="510" width="230" height="22" rx="4" fill="#FF4444" opacity="0.6"/>
  <text x="590" y="527" fill="#FF4444" font-family="sans-serif" font-size="13" font-weight="bold">↓ 46% (2024) 预计再↓ 53%</text>

  <text x="100" y="555" fill="#FFFFFF" font-family="sans-serif" font-size="13">中国毕业生招聘信息</text>
  <rect x="350" y="540" width="110" height="22" rx="4" fill="#FF4444" opacity="0.7"/>
  <text x="470" y="557" fill="#FF4444" font-family="sans-serif" font-size="13" font-weight="bold">↓ 22% (H1 2025)</text>

  <!-- China youth unemployment -->
  <rect x="750" y="410" width="350" height="85" rx="10" fill="#FF4444" fill-opacity="0.06" stroke="#FF4444" stroke-width="1"/>
  <text x="770" y="436" fill="#FF4444" font-family="sans-serif" font-size="15" font-weight="bold">🇨🇳 中国青年失业率</text>
  <text x="770" y="458" fill="#FFFFFF" font-family="sans-serif" font-size="13">16-24岁: <tspan fill="#FF4444" font-weight="bold">18.9%</tspan> (2025年8月)</text>
  <text x="770" y="480" fill="#888888" font-family="sans-serif" font-size="11">毕业生1222万(创纪录) · 招聘↓22%</text>

  <!-- Paradox box -->
  <rect x="750" y="508" width="350" height="55" rx="10" fill="#FF9800" fill-opacity="0.06" stroke="#FF9800" stroke-width="1"/>
  <text x="770" y="532" fill="#FF9800" font-family="sans-serif" font-size="13" font-weight="bold">讽刺</text>
  <text x="770" y="552" fill="#888888" font-family="sans-serif" font-size="11">AI对初级员工生产力提升更大(27-39% vs 8-13%)</text>

  <!-- Broken Ladder -->
  <rect x="80" y="590" width="1040" height="80" rx="12" fill="#FF4444" fill-opacity="0.08" stroke="#FF4444" stroke-width="1.5"/>
  <text x="600" y="618" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="16" font-weight="bold">断裂的职业阶梯</text>
  <text x="600" y="645" text-anchor="middle" fill="#FF9800" font-family="sans-serif" font-size="14">资深升职/离职 → 中级补上 → 初级补上 → <tspan fill="#FF4444" font-weight="bold" text-decoration="line-through">新人入场</tspan> ← AI切断此环</text>
  <text x="600" y="665" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="12">没有初级岗位 = 没有入场券 = 永远不会变成"有经验的人" · 一代人的职业生涯可能在开始前就已结束</text>

  <!-- Bottom insight -->
  <text x="600" y="720" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="14">不是35岁危机消失了，而是危机下移了十年。从"35岁被淘汰"变成"25岁进不了门"。</text>

  <!-- Sources -->
  <text x="600" y="790" text-anchor="middle" fill="#444444" font-family="sans-serif" font-size="10">数据来源: Harvard/SSRN(2025) · SignalFire · Revelio Labs · SCMP · Caixin · NACE · LeadDev · IntuitionLabs</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <marker id="arrFS" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF9800"/>
    </marker>
  </defs>
  <rect width="1200" height="800" fill="#0A0A0A"/>

  <!-- Title -->
  <text x="600" y="55" text-anchor="middle" fill="#FFFFFF" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="28" font-weight="bold">AI-生育率下降螺旋</text>

  <!-- 5-node circle -->
  <!-- Node positions (pentagon, clockwise from top) -->
  <!-- Top: AI取代工作 -->
  <circle cx="600" cy="200" r="70" fill="none" stroke="#00BCD4" stroke-width="2.5"/>
  <text x="600" y="193" text-anchor="middle" fill="#FFFFFF" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="16" font-weight="bold">AI取代工作</text>

  <!-- Right-top: 收入下降 -->
  <circle cx="880" cy="370" r="70" fill="none" stroke="#FF9800" stroke-width="2.5"/>
  <text x="880" y="363" text-anchor="middle" fill="#FFFFFF" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="16" font-weight="bold">收入下降</text>

  <!-- Right-bottom: 不敢生育 -->
  <circle cx="780" cy="600" r="70" fill="none" stroke="#FF4444" stroke-width="2.5"/>
  <text x="780" y="593" text-anchor="middle" fill="#FFFFFF" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="16" font-weight="bold">不敢生育</text>

  <!-- Left-bottom: 人口萎缩 -->
  <circle cx="420" cy="600" r="70" fill="none" stroke="#FF4444" stroke-width="2.5"/>
  <text x="420" y="593" text-anchor="middle" fill="#FFFFFF" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="16" font-weight="bold">人口萎缩</text>

  <!-- Left-top: 更依赖AI -->
  <circle cx="320" cy="370" r="70" fill="none" stroke="#2196F3" stroke-width="2.5"/>
  <text x="320" y="363" text-anchor="middle" fill="#FFFFFF" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="16" font-weight="bold">更依赖AI</text>

  <!-- Arrows connecting (clockwise) -->
  <path d="M660,230 Q780,260 845,310" stroke="#FF9800" stroke-width="2" fill="none" marker-end="url(#arrFS)"/>
  <path d="M920,425 Q920,520 830,560" stroke="#FF9800" stroke-width="2" fill="none" marker-end="url(#arrFS)"/>
  <path d="M715,620 Q600,650 490,620" stroke="#FF9800" stroke-width="2" fill="none" marker-end="url(#arrFS)"/>
  <path d="M365,565 Q300,500 300,430" stroke="#FF9800" stroke-width="2" fill="none" marker-end="url(#arrFS)"/>
  <path d="M365,315 Q420,260 545,210" stroke="#FF9800" stroke-width="2" fill="none" marker-end="url(#arrFS)"/>

  <!-- Center -->
  <text x="600" y="420" text-anchor="middle" fill="#FF4444" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="22" font-weight="bold">⚠ 没有人能踩住刹车</text>

  <!-- Bottom insight -->
  <rect x="250" y="710" width="700" height="60" rx="10" fill="#00BCD4" fill-opacity="0.08" stroke="#00BCD4" stroke-width="1"/>
  <text x="600" y="735" text-anchor="middle" fill="#00BCD4" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="15">反直觉：也许人口下降是好事？AI+机器人可以替代劳动</text>
</svg>
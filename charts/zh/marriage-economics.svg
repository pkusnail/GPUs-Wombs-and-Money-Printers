<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <rect width="1200" height="800" fill="#0A0A0A"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="#FFFFFF" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="26" font-weight="bold">婚育的经济学：当ROI为负</text>

  <!-- LEFT PANEL: Marriage Rate Decline -->
  <text x="300" y="125" text-anchor="middle" fill="#2196F3" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="20" font-weight="bold">结婚率暴跌</text>

  <!-- China marriage data -->
  <rect x="80" y="155" width="440" height="200" rx="10" fill="#2196F3" fill-opacity="0.06" stroke="#2196F3" stroke-width="1"/>
  <text x="100" y="180" fill="#2196F3" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="16" font-weight="bold">🇨🇳 中国</text>

  <!-- Bar chart: China marriages declining -->
  <!-- 2013: 13.47M → 2019: 9.27M → 2024: 6.1M -->
  <text x="145" y="215" text-anchor="middle" fill="#888888" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="10">2013</text>
  <rect x="120" y="225" width="50" height="110" rx="3" fill="#2196F3" opacity="0.8"/>
  <text x="145" y="350" text-anchor="middle" fill="#FFFFFF" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="11">1347万</text>

  <text x="235" y="215" text-anchor="middle" fill="#888888" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="10">2019</text>
  <rect x="210" y="260" width="50" height="75" rx="3" fill="#2196F3" opacity="0.6"/>
  <text x="235" y="350" text-anchor="middle" fill="#FFFFFF" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="11">927万</text>

  <text x="325" y="215" text-anchor="middle" fill="#888888" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="10">2024</text>
  <rect x="300" y="290" width="50" height="45" rx="3" fill="#FF4444" opacity="0.8"/>
  <text x="325" y="350" text-anchor="middle" fill="#FF4444" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="11" font-weight="bold">610万</text>

  <text x="420" y="280" text-anchor="middle" fill="#FF4444" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="14" font-weight="bold">-55%</text>
  <text x="420" y="300" text-anchor="middle" fill="#888888" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="11">11年降幅</text>
  <text x="300" y="345" text-anchor="middle" fill="#FF4444" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="10">1986年以来最低</text>

  <!-- US + OECD -->
  <rect x="80" y="370" width="440" height="75" rx="10" fill="#FF9800" fill-opacity="0.06" stroke="#FF9800" stroke-width="1"/>
  <text x="100" y="395" fill="#FF9800" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="14" font-weight="bold">🇺🇸 美国</text>
  <text x="100" y="415" fill="#888888" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="12">结婚率：8.2‰(2000) → 6.1‰(2023) ↓25%</text>

  <rect x="80" y="455" width="440" height="55" rx="10" fill="#00BCD4" fill-opacity="0.06" stroke="#00BCD4" stroke-width="1"/>
  <text x="100" y="478" fill="#00BCD4" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="14" font-weight="bold">🌍 OECD 平均</text>
  <text x="100" y="498" fill="#888888" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="12">5.1‰(2000) → 3.8‰(2025) ↓25% · 初婚年龄 25→32岁</text>

  <!-- RIGHT PANEL: Child ROI -->
  <text x="900" y="125" text-anchor="middle" fill="#FF4444" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="20" font-weight="bold">养育成本 vs 回报</text>

  <rect x="680" y="155" width="440" height="360" rx="10" fill="#FF4444" fill-opacity="0.06" stroke="#FF4444" stroke-width="1"/>

  <!-- Cost comparison -->
  <text x="900" y="185" text-anchor="middle" fill="#FFFFFF" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="16" font-weight="bold">养一个孩子到18岁的成本（×人均GDP）</text>

  <!-- China bar -->
  <text x="720" y="250" fill="#FFFFFF" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="14">中国</text>
  <rect x="810" y="235" width="252" height="30" rx="4" fill="#FF4444" opacity="0.7"/>
  <text x="1070" y="255" fill="#FF4444" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="14" font-weight="bold">6.3×</text>
  <text x="900" y="275" text-anchor="middle" fill="#888888" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="11">¥53.8万/孩 · 全球第二高</text>

  <!-- US bar -->
  <text x="720" y="310" fill="#FFFFFF" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="14">美国</text>
  <rect x="810" y="295" width="164" height="30" rx="4" fill="#FF9800" opacity="0.7"/>
  <text x="982" y="315" fill="#FF9800" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="14" font-weight="bold">4.1×</text>

  <!-- France bar -->
  <text x="720" y="365" fill="#FFFFFF" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="14">法国</text>
  <rect x="810" y="350" width="80" height="30" rx="4" fill="#2196F3" opacity="0.6"/>
  <text x="898" y="370" fill="#2196F3" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="14">2.0×</text>

  <!-- Sweden bar -->
  <text x="720" y="420" fill="#FFFFFF" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="14">瑞典</text>
  <rect x="810" y="405" width="60" height="30" rx="4" fill="#00BCD4" opacity="0.6"/>
  <text x="878" y="425" fill="#00BCD4" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="14">1.5×</text>

  <!-- The ROI shift -->
  <text x="900" y="470" text-anchor="middle" fill="#FF9800" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="13" font-weight="bold">农业时代：孩子 = 劳动力 = 正ROI</text>
  <text x="900" y="510" text-anchor="middle" fill="#FF4444" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="13" font-weight="bold">AI时代：孩子 ≠ 生产力 = 负ROI</text>

  <!-- BOTTOM: Economic Logic Chain -->
  <rect x="80" y="555" width="1040" height="110" rx="12" fill="#FF9800" fill-opacity="0.08" stroke="#FF9800" stroke-width="1.5"/>
  <text x="600" y="585" text-anchor="middle" fill="#FFFFFF" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="18" font-weight="bold">经济规律驱动的婚育崩塌链</text>

  <text x="600" y="645" text-anchor="middle" fill="#FF9800" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="14">AI取代工作 → 收入不稳 → 结婚延迟/不婚 → 离婚率↑ → 生育意愿↓ → 养育ROI为负 → 人口萎缩</text>

  <!-- Bottom insight -->
  <text x="600" y="720" text-anchor="middle" fill="#888888" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="14">这不是文化问题，这是经济规律 — 当生产力不再需要人口数量来支撑</text>

  <!-- Sources -->
  <text x="600" y="785" text-anchor="middle" fill="#444444" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="10">数据来源: 中国民政部(2024) · CDC/NCHS(2023) · OECD Society at a Glance(2024) · 育娲人口研究(2024)</text>
</svg>
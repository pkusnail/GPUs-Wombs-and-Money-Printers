<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#00BCD4"/>
    </marker>
  </defs>
  <rect width="1200" height="800" fill="#0A0A0A"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="#FFFFFF" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="26" font-weight="bold">失业—财政—延寿：三条错位的时间线</text>

  <!-- Time axis -->
  <line x1="120" y1="520" x2="1080" y2="520" stroke="#333333" stroke-width="2"/>

  <!-- Axis labels -->
  <text x="120" y="545" text-anchor="middle" fill="#888888" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="13">2025</text>
  <text x="312" y="545" text-anchor="middle" fill="#888888" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="13">2028</text>
  <text x="504" y="545" text-anchor="middle" fill="#888888" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="13">2030</text>
  <text x="696" y="545" text-anchor="middle" fill="#888888" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="13">2035</text>
  <text x="888" y="545" text-anchor="middle" fill="#888888" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="13">2040</text>
  <text x="1080" y="545" text-anchor="middle" fill="#888888" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="13">2045</text>

  <!-- Tick marks -->
  <line x1="120" y1="515" x2="120" y2="525" stroke="#555555" stroke-width="1"/>
  <line x1="312" y1="515" x2="312" y2="525" stroke="#555555" stroke-width="1"/>
  <line x1="504" y1="515" x2="504" y2="525" stroke="#555555" stroke-width="1"/>
  <line x1="696" y1="515" x2="696" y2="525" stroke="#555555" stroke-width="1"/>
  <line x1="888" y1="515" x2="888" y2="525" stroke="#555555" stroke-width="1"/>
  <line x1="1080" y1="515" x2="1080" y2="525" stroke="#555555" stroke-width="1"/>

  <!-- Layer 1: Employment Displacement 2028-2035 -->
  <rect x="312" y="160" width="384" height="80" rx="10" fill="#FF4444" fill-opacity="0.1" stroke="#FF4444" stroke-width="1.5"/>
  <text x="332" y="190" fill="#FF4444" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="18" font-weight="bold">就业替代</text>
  <text x="332" y="215" fill="#FFFFFF" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="13">2028–2035: 白领/司机/仓储岗位集中收缩</text>
  <text x="332" y="233" fill="#888888" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="11">Agent落地 · 自动驾驶普及 · 中介消失</text>
  <!-- Connector to axis -->
  <line x1="312" y1="240" x2="312" y2="515" stroke="#FF4444" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="696" y1="240" x2="696" y2="515" stroke="#FF4444" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- Layer 2: Fiscal / Pension Squeeze 2030-2045 -->
  <rect x="504" y="280" width="576" height="80" rx="10" fill="#FF9800" fill-opacity="0.1" stroke="#FF9800" stroke-width="1.5"/>
  <text x="524" y="310" fill="#FF9800" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="18" font-weight="bold">财政/养老金挤兑</text>
  <text x="524" y="335" fill="#FFFFFF" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="13">2030–2045: 税基缩小 + 退休期延长 = 双重挤压</text>
  <text x="524" y="353" fill="#888888" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="11">工资税收入↓ · 老龄人口↑ · 社保基金承压</text>
  <!-- Connector to axis -->
  <line x1="504" y1="360" x2="504" y2="515" stroke="#FF9800" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="1080" y1="360" x2="1080" y2="515" stroke="#FF9800" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- Layer 3: Longevity Diffusion 2040+ -->
  <rect x="888" y="400" width="192" height="80" rx="10" fill="#2196F3" fill-opacity="0.1" stroke="#2196F3" stroke-width="1.5"/>
  <text x="908" y="430" fill="#2196F3" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="18" font-weight="bold">延寿普及</text>
  <text x="908" y="450" fill="#FFFFFF" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="13">2040+: 高成本疗法</text>
  <text x="908" y="468" fill="#888888" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="11">逐步下沉 →</text>
  <!-- Right fade arrow -->
  <line x1="1080" y1="440" x2="1140" y2="440" stroke="#2196F3" stroke-width="2" stroke-dasharray="6,4" opacity="0.6"/>
  <!-- Connector to axis -->
  <line x1="888" y1="480" x2="888" y2="515" stroke="#2196F3" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- Gap annotation: the dangerous window -->
  <line x1="350" y1="125" x2="850" y2="125" stroke="#00BCD4" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="430" y="100" width="320" height="28" rx="6" fill="#0A0A0A"/>
  <text x="590" y="120" text-anchor="middle" fill="#00BCD4" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="14" font-weight="bold">空窗期: 工作已消失，延寿尚未普及</text>

  <!-- Stagger visualization -->
  <text x="100" y="195" text-anchor="end" fill="#FF4444" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="13" font-weight="bold">先发</text>
  <text x="100" y="315" text-anchor="end" fill="#FF9800" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="13" font-weight="bold">随后</text>
  <text x="100" y="435" text-anchor="end" fill="#2196F3" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="13" font-weight="bold">最晚</text>

  <!-- Bottom insight -->
  <rect x="80" y="590" width="1040" height="80" rx="10" fill="#FF4444" fill-opacity="0.08" stroke="#FF4444" stroke-width="1"/>
  <text x="600" y="620" text-anchor="middle" fill="#FF4444" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="16" font-weight="bold">活得更久，但先经历一段没有稳定收入和保障的空窗期</text>
  <text x="600" y="645" text-anchor="middle" fill="#FFFFFF" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="13">问题不在寿命长本身，而在价值分配和社保模型能否跟上替代速度</text>

  <!-- Sources -->
  <text x="600" y="780" text-anchor="middle" fill="#444444" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="10">综合推演 · Based on McKinsey, IMF fiscal projections, Nature Aging timelines</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
 <rect width="1200" height="600" fill="#0A0A0A"/>

 <!-- Title -->
 <text x="600" y="50" text-anchor="middle" fill="#FFFFFF" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="26" font-weight="bold">全球AI的单点故障：芯片命脉</text>

 <!-- Funnel: Top - wide -->
 <rect x="200" y="90" width="800" height="60" rx="8" fill="#2196F3" fill-opacity="0.1" stroke="#2196F3" stroke-width="1"/>
 <text x="600" y="125" text-anchor="middle" fill="#FFFFFF" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="16">全球AI算力需求（数万亿美元市场）</text>
 <line x1="600" y1="150" x2="600" y2="170" stroke="#555" stroke-width="1"/>
 <polygon points="594,170 606,170 600,178" fill="#555"/>

 <!-- Funnel: Design -->
 <rect x="280" y="180" width="640" height="60" rx="8" fill="#FF9800" fill-opacity="0.1" stroke="#FF9800" stroke-width="1"/>
 <text x="600" y="215" text-anchor="middle" fill="#FFFFFF" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="15">AI芯片设计：NVIDIA · AMD · Google · 华为海思</text>
 <line x1="600" y1="240" x2="600" y2="260" stroke="#555" stroke-width="1"/>
 <polygon points="594,260 606,260 600,268" fill="#555"/>

 <!-- Funnel: TSMC BOTTLENECK - highlighted -->
 <rect x="350" y="270" width="500" height="100" rx="12" fill="#FF4444" fill-opacity="0.15" stroke="#FF4444" stroke-width="2.5"/>

 <!-- Pulsing glow effect -->
 <rect x="355" y="275" width="490" height="90" rx="10" fill="none" stroke="#FF4444" stroke-width="1" opacity="0.4"/>

 <text x="600" y="300" text-anchor="middle" fill="#FF4444" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="20" font-weight="bold">台积电 (TSMC) — 瓶颈</text>
 <text x="600" y="325" text-anchor="middle" fill="#FFFFFF" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="14">全球晶圆代工 67% · 先进制程（7nm以下）90%+</text>
 <text x="600" y="348" text-anchor="middle" fill="#FF9800" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="13">所有主流AI芯片（H100/B200/MI300/TPU）= 唯一供应商</text>

 <!-- Warning labels on sides -->
 <text x="330" y="310" text-anchor="end" fill="#FF4444" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="22"></text>
 <text x="870" y="310" fill="#FF4444" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="22"></text>

 <line x1="600" y1="370" x2="600" y2="390" stroke="#555" stroke-width="1"/>
 <polygon points="594,390 606,390 600,398" fill="#555"/>

 <!-- Funnel: Training -->
 <rect x="280" y="400" width="640" height="60" rx="8" fill="#2196F3" fill-opacity="0.1" stroke="#2196F3" stroke-width="1"/>
 <text x="600" y="435" text-anchor="middle" fill="#FFFFFF" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="15">AI训练与推理（全球数据中心）</text>
 <line x1="600" y1="460" x2="600" y2="480" stroke="#555" stroke-width="1"/>
 <polygon points="594,480 606,480 600,488" fill="#555"/>

 <!-- Funnel: Bottom - wide -->
 <rect x="200" y="490" width="800" height="50" rx="8" fill="#2196F3" fill-opacity="0.06" stroke="#333" stroke-width="1"/>
 <text x="600" y="520" text-anchor="middle" fill="#888888" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="15">AI应用与服务（影响所有人的生活）</text>

 <!-- Side notes -->
 <rect x="30" y="270" width="280" height="100" rx="8" fill="#FF9800" fill-opacity="0.06" stroke="#FF9800" stroke-width="1"/>
 <text x="170" y="295" text-anchor="middle" fill="#FF9800" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="13" font-weight="bold">追赶者</text>
 <text x="50" y="318" fill="#888888" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="11">三星 3nm GAA — 良率远低于台积电</text>
 <text x="50" y="338" fill="#888888" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="11">Intel 18A — 刚起步，无AI芯片客户</text>
 <text x="50" y="358" fill="#888888" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="11">短期内格局不会改变</text>

 <rect x="890" y="270" width="280" height="100" rx="8" fill="#2196F3" fill-opacity="0.06" stroke="#2196F3" stroke-width="1"/>
 <text x="1030" y="295" text-anchor="middle" fill="#2196F3" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="13" font-weight="bold">各国的应对</text>
 <text x="910" y="318" fill="#888888" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="11"> CHIPS Act — 500亿+</text>
 <text x="910" y="338" fill="#888888" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="11"> 欧洲芯片法案 — 430亿€</text>
 <text x="910" y="358" fill="#888888" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="11"> 芯片自主化 — 持续投入</text>

 <text x="600" y="580" text-anchor="middle" fill="#444444" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="10">数据来源: TSMC 2025 Q1财报 · SemiWiki · Astute Group</text>
</svg>

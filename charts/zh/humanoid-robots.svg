<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <rect width="1200" height="900" fill="#0A0A0A"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="26" font-weight="bold">人形机器人：中国的硬件优势</text>

  <!-- LEFT PANEL: Market Share -->
  <text x="300" y="125" text-anchor="middle" fill="#FF9800" font-family="sans-serif" font-size="20" font-weight="bold">全球出货份额</text>

  <!-- Big donut-style visual: China 90% -->
  <circle cx="300" cy="310" r="130" fill="none" stroke="#333333" stroke-width="40"/>
  <circle cx="300" cy="310" r="130" fill="none" stroke="#FF4444" stroke-width="40" stroke-dasharray="735 82" stroke-dashoffset="204" opacity="0.8"/>
  <circle cx="300" cy="310" r="130" fill="none" stroke="#2196F3" stroke-width="40" stroke-dasharray="82 735" stroke-dashoffset="204" opacity="0.6"/>

  <text x="300" y="295" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="48" font-weight="bold">~90%</text>
  <text x="300" y="330" text-anchor="middle" fill="#FF4444" font-family="sans-serif" font-size="16">中国制造</text>

  <!-- Legend -->
  <rect x="180" y="470" width="16" height="16" rx="2" fill="#FF4444" opacity="0.8"/>
  <text x="204" y="484" fill="#FFFFFF" font-family="sans-serif" font-size="13">中国 ~90%</text>
  <rect x="340" y="470" width="16" height="16" rx="2" fill="#2196F3" opacity="0.6"/>
  <text x="364" y="484" fill="#FFFFFF" font-family="sans-serif" font-size="13">其他 ~10%</text>

  <!-- Key players -->
  <rect x="100" y="510" width="400" height="155" rx="10" fill="#FF4444" fill-opacity="0.06" stroke="#FF4444" stroke-width="1"/>
  <text x="120" y="538" fill="#FF9800" font-family="sans-serif" font-size="14" font-weight="bold">头部企业 (2025)</text>

  <text x="120" y="565" fill="#FFFFFF" font-family="sans-serif" font-size="13">智元机器人 AgiBot</text>
  <text x="380" y="565" text-anchor="end" fill="#FF4444" font-family="sans-serif" font-size="13" font-weight="bold">5,168 台</text>

  <text x="120" y="590" fill="#FFFFFF" font-family="sans-serif" font-size="13">宇树科技 Unitree</text>
  <text x="380" y="590" text-anchor="end" fill="#FF4444" font-family="sans-serif" font-size="13" font-weight="bold">5,500+ 台</text>

  <text x="120" y="615" fill="#FFFFFF" font-family="sans-serif" font-size="13">优必选 UBTECH</text>
  <text x="380" y="615" text-anchor="end" fill="#FF4444" font-family="sans-serif" font-size="13" font-weight="bold">量产中</text>

  <text x="120" y="645" fill="#888888" font-family="sans-serif" font-size="13">特斯拉 Tesla Optimus</text>
  <text x="380" y="645" text-anchor="end" fill="#888888" font-family="sans-serif" font-size="13">尚未销售</text>

  <text x="300" y="680" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="11">中国：140+ 企业，330+ 机型</text>

  <!-- RIGHT PANEL: Bottlenecks -->
  <text x="850" y="125" text-anchor="middle" fill="#FF4444" font-family="sans-serif" font-size="20" font-weight="bold">关键瓶颈</text>

  <!-- Bottleneck 1: Data Gap -->
  <rect x="620" y="155" width="460" height="160" rx="10" fill="#FF9800" fill-opacity="0.06" stroke="#FF9800" stroke-width="1"/>
  <text x="650" y="185" fill="#FF9800" font-family="sans-serif" font-size="16" font-weight="bold">🧠 训练数据鸿沟</text>

  <text x="650" y="215" fill="#FFFFFF" font-family="sans-serif" font-size="13">语言数据</text>
  <rect x="840" y="200" width="220" height="22" rx="3" fill="#00BCD4" opacity="0.7"/>
  <text x="955" y="216" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="11" font-weight="bold">100,000+ 年人类文本</text>

  <text x="650" y="255" fill="#FFFFFF" font-family="sans-serif" font-size="13">操控数据</text>
  <rect x="840" y="240" width="8" height="22" rx="3" fill="#FF4444" opacity="0.8"/>
  <text x="860" y="256" fill="#FF4444" font-family="sans-serif" font-size="11" font-weight="bold">≈ 0</text>

  <text x="850" y="295" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="12">"ChatGPT能写完美律师函，但机器人拿不稳一个鸡蛋"</text>
  <text x="850" y="313" text-anchor="middle" fill="#555555" font-family="sans-serif" font-size="11">— Ken Goldberg, UC Berkeley</text>

  <!-- Bottleneck 2: Battery -->
  <rect x="620" y="330" width="460" height="90" rx="10" fill="#2196F3" fill-opacity="0.06" stroke="#2196F3" stroke-width="1"/>
  <text x="650" y="358" fill="#2196F3" font-family="sans-serif" font-size="16" font-weight="bold">🔋 续航不足</text>
  <text x="650" y="385" fill="#FFFFFF" font-family="sans-serif" font-size="14">当前：2-3 小时/充电</text>
  <text x="650" y="408" fill="#888888" font-family="sans-serif" font-size="12">工业班次需要 8+ 小时</text>

  <!-- Bottleneck 3: Autonomy -->
  <rect x="620" y="435" width="460" height="90" rx="10" fill="#00BCD4" fill-opacity="0.06" stroke="#00BCD4" stroke-width="1"/>
  <text x="650" y="463" fill="#00BCD4" font-family="sans-serif" font-size="16" font-weight="bold">🤖 自主性</text>
  <text x="650" y="490" fill="#FFFFFF" font-family="sans-serif" font-size="14">当前：预编程 + 遥控操作</text>
  <text x="650" y="513" fill="#888888" font-family="sans-serif" font-size="12">需要：sim-to-real 训练突破</text>

  <!-- BOTTOM: Timeline projection -->
  <rect x="80" y="700" width="1040" height="110" rx="12" fill="#FF9800" fill-opacity="0.08" stroke="#FF9800" stroke-width="1.5"/>
  <text x="600" y="730" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="18" font-weight="bold">替代螺旋的延伸：从认知到物理</text>

  <text x="600" y="790" text-anchor="middle" fill="#FF9800" font-family="sans-serif" font-size="14">AI软件裁白领 → 白领降档蓝领 → 人形机器人裁蓝领 → 无处可退</text>

  <!-- Bottom insight -->
  <text x="600" y="850" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="14">美国掌控智能的大脑（GPU），中国掌控智能的身体（机器人硬件）</text>

  <!-- Sources -->
  <text x="600" y="895" text-anchor="middle" fill="#444444" font-family="sans-serif" font-size="10">数据来源: Pandaily(2026) · Reuters(2026) · IEEE Spectrum(2026) · UC Berkeley Robotics</text>
</svg>
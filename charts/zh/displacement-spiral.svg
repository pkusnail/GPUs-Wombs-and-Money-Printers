<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="#0A0A0A"/>

  <!-- Title -->
  <text x="600" y="55" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="28" font-weight="bold">智能替代螺旋</text>

  <!-- Circular flow - 4 nodes -->
  <!-- Node 1: AI更强 (top) -->
  <circle cx="600" cy="220" r="75" fill="none" stroke="#00BCD4" stroke-width="3" filter="url(#glow2)"/>
  <text x="600" y="210" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="18" font-weight="bold">AI 更强</text>

  <!-- Node 2: 企业裁员 (right) -->
  <circle cx="870" cy="430" r="75" fill="none" stroke="#FF9800" stroke-width="3"/>
  <text x="870" y="420" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="18" font-weight="bold">企业裁员</text>

  <!-- Node 3: 省下的钱买更多AI (bottom) -->
  <circle cx="600" cy="620" r="75" fill="none" stroke="#2196F3" stroke-width="3"/>
  <text x="600" y="605" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="16" font-weight="bold">节省资金</text>
  <text x="600" y="625" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="16" font-weight="bold">投入更多AI</text>

  <!-- Node 4: 成本更低 (left) -->
  <circle cx="330" cy="430" r="75" fill="none" stroke="#00BCD4" stroke-width="3"/>
  <text x="330" y="420" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="18" font-weight="bold">成本更低</text>

  <!-- Arrows connecting nodes (clockwise) -->
  <!-- Top → Right -->
  <path d="M665,260 Q790,280 830,365" stroke="#00BCD4" stroke-width="3" fill="none" marker-end="url(#arrowCyan)"/>
  <!-- Right → Bottom -->
  <path d="M830,495 Q790,570 665,600" stroke="#FF9800" stroke-width="3" fill="none" marker-end="url(#arrowOrange)"/>
  <!-- Bottom → Left -->
  <path d="M535,600 Q430,570 370,495" stroke="#2196F3" stroke-width="3" fill="none" marker-end="url(#arrowBlue)"/>
  <!-- Left → Top -->
  <path d="M370,365 Q410,280 535,260" stroke="#00BCD4" stroke-width="3" fill="none" marker-end="url(#arrowCyan)"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00BCD4"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF9800"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2196F3"/>
    </marker>
  </defs>

  <!-- Center warning -->
  <text x="600" y="415" text-anchor="middle" fill="#FF4444" font-family="sans-serif" font-size="20" font-weight="bold">⚠ 没有人会踩刹车</text>

  <!-- Edge labels (pushed outward from curve paths) -->
  <text x="790" y="270" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="12" transform="rotate(20,790,270)">取代人工</text>
  <text x="790" y="590" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="12" transform="rotate(-20,790,590)">资金释放</text>
  <text x="410" y="590" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="12" transform="rotate(20,410,590)">扩大采购</text>
  <text x="410" y="270" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="12" transform="rotate(-20,410,270)">能力跃升</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <rect width="1200" height="800" fill="#0A0A0A"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="26" font-weight="bold">Three Friction Layers Slowing AI Proliferation</text>

  <!-- Layer 1: Physical -->
  <rect x="80" y="110" width="1040" height="190" rx="12" fill="#FF4444" fill-opacity="0.06" stroke="#FF4444" stroke-width="1.5"/>
  <text x="110" y="145" fill="#FF4444" font-family="sans-serif" font-size="22" font-weight="bold">Physical Layer</text>
  <text x="310" y="145" fill="#888888" font-family="sans-serif" font-size="14">Resolution: 5-10 years</text>

  <!-- Power -->
  <rect x="110" y="160" width="310" height="55" rx="6" fill="#0A0A0A" stroke="#FF4444" stroke-width="1" opacity="0.8"/>
  <text x="130" y="185" fill="#FFFFFF" font-family="sans-serif" font-size="14" font-weight="bold">Power</text>
  <text x="130" y="205" fill="#888888" font-family="sans-serif" font-size="11">134GW needed by 2030 · 7-yr grid queue · 50% delayed</text>

  <!-- Chips -->
  <rect x="445" y="160" width="310" height="55" rx="6" fill="#0A0A0A" stroke="#FF4444" stroke-width="1" opacity="0.8"/>
  <text x="465" y="185" fill="#FFFFFF" font-family="sans-serif" font-size="14" font-weight="bold">Chips</text>
  <text x="465" y="205" fill="#888888" font-family="sans-serif" font-size="11">TSMC capacity = 1/3 demand · New fabs 3-5 yrs · $20B+</text>

  <!-- Robot hardware -->
  <rect x="780" y="160" width="310" height="55" rx="6" fill="#0A0A0A" stroke="#FF4444" stroke-width="1" opacity="0.8"/>
  <text x="800" y="185" fill="#FFFFFF" font-family="sans-serif" font-size="14" font-weight="bold">Robot Hardware</text>
  <text x="800" y="205" fill="#888888" font-family="sans-serif" font-size="11">Battery 2-3h · No safety standards · Dexterity gaps</text>

  <!-- Data -->
  <rect x="110" y="225" width="310" height="55" rx="6" fill="#0A0A0A" stroke="#FF4444" stroke-width="1" opacity="0.8"/>
  <text x="130" y="250" fill="#FFFFFF" font-family="sans-serif" font-size="14" font-weight="bold">Training Data</text>
  <text x="130" y="270" fill="#888888" font-family="sans-serif" font-size="11">High-quality text exhausted ~2028 · Synthetic data partial fix</text>

  <!-- Carbon -->
  <rect x="445" y="225" width="310" height="55" rx="6" fill="#0A0A0A" stroke="#FF4444" stroke-width="1" opacity="0.8"/>
  <text x="465" y="250" fill="#FFFFFF" font-family="sans-serif" font-size="14" font-weight="bold">Carbon Emissions</text>
  <text x="465" y="270" fill="#888888" font-family="sans-serif" font-size="11">AI: 32.8-79.7M tons CO2/yr · Cities issuing bans</text>

  <!-- Layer 2: Trust -->
  <rect x="80" y="315" width="1040" height="190" rx="12" fill="#FF9800" fill-opacity="0.06" stroke="#FF9800" stroke-width="1.5"/>
  <text x="110" y="350" fill="#FF9800" font-family="sans-serif" font-size="22" font-weight="bold">Trust Layer</text>
  <text x="290" y="350" fill="#888888" font-family="sans-serif" font-size="14">Resolution: 2-5 years</text>

  <!-- Hallucination -->
  <rect x="110" y="365" width="310" height="55" rx="6" fill="#0A0A0A" stroke="#FF9800" stroke-width="1" opacity="0.8"/>
  <text x="130" y="390" fill="#FFFFFF" font-family="sans-serif" font-size="14" font-weight="bold">Hallucination</text>
  <text x="130" y="410" fill="#888888" font-family="sans-serif" font-size="11">Factual QA hallucination 33-48% · Legal false citations rampant</text>

  <!-- Last mile -->
  <rect x="445" y="365" width="310" height="55" rx="6" fill="#0A0A0A" stroke="#FF9800" stroke-width="1" opacity="0.8"/>
  <text x="465" y="390" fill="#FFFFFF" font-family="sans-serif" font-size="14" font-weight="bold">Last Mile Problem</text>
  <text x="465" y="410" fill="#888888" font-family="sans-serif" font-size="11">80% to 99.9% takes 80% of effort · Waymo still geo-fenced</text>

  <!-- ROI -->
  <rect x="780" y="365" width="310" height="55" rx="6" fill="#0A0A0A" stroke="#FF9800" stroke-width="1" opacity="0.8"/>
  <text x="800" y="390" fill="#FFFFFF" font-family="sans-serif" font-size="14" font-weight="bold">ROI Trough</text>
  <text x="800" y="410" fill="#888888" font-family="sans-serif" font-size="11">95% enterprise GenAI zero ROI · Avg burn $1.9M/project</text>

  <!-- Historical precedent -->
  <rect x="110" y="430" width="980" height="55" rx="6" fill="#0A0A0A" stroke="#FF9800" stroke-width="1" opacity="0.8"/>
  <text x="130" y="455" fill="#FFFFFF" font-family="sans-serif" font-size="14" font-weight="bold">Historical Precedent</text>
  <text x="130" y="475" fill="#888888" font-family="sans-serif" font-size="11">Self-driving: 2015 promise, 2026 still geo-fenced · GM Cruise burned $10B then shut down · Fusion: always "30 yrs away" · Metaverse: 38 daily users</text>

  <!-- Layer 3: Institutional -->
  <rect x="80" y="520" width="1040" height="130" rx="12" fill="#2196F3" fill-opacity="0.06" stroke="#2196F3" stroke-width="1.5"/>
  <text x="110" y="555" fill="#2196F3" font-family="sans-serif" font-size="22" font-weight="bold">Institutional Layer</text>
  <text x="340" y="555" fill="#888888" font-family="sans-serif" font-size="14">Resolution: 3-7+ years</text>

  <!-- Regulation -->
  <rect x="110" y="570" width="310" height="55" rx="6" fill="#0A0A0A" stroke="#2196F3" stroke-width="1" opacity="0.8"/>
  <text x="130" y="595" fill="#FFFFFF" font-family="sans-serif" font-size="14" font-weight="bold">Regulation</text>
  <text x="130" y="615" fill="#888888" font-family="sans-serif" font-size="11">EU AI Act fully effective 2026 · China cybersecurity law covers AI</text>

  <!-- Unions -->
  <rect x="445" y="570" width="310" height="55" rx="6" fill="#0A0A0A" stroke="#2196F3" stroke-width="1" opacity="0.8"/>
  <text x="465" y="595" fill="#FFFFFF" font-family="sans-serif" font-size="14" font-weight="bold">Unions</text>
  <text x="465" y="615" fill="#888888" font-family="sans-serif" font-size="11">Ports ban full automation · WGA/SAG limit AI · Dock strikes</text>

  <!-- Liability -->
  <rect x="780" y="570" width="310" height="55" rx="6" fill="#0A0A0A" stroke="#2196F3" stroke-width="1" opacity="0.8"/>
  <text x="800" y="595" fill="#FFFFFF" font-family="sans-serif" font-size="14" font-weight="bold">Liability Gap</text>
  <text x="800" y="615" fill="#888888" font-family="sans-serif" font-size="11">AI agents have no legal personhood · No federal robot safety rules</text>

  <!-- BOTTOM: Key Insight -->
  <rect x="80" y="670" width="1040" height="60" rx="10" fill="#00BCD4" fill-opacity="0.08" stroke="#00BCD4" stroke-width="1"/>
  <text x="600" y="698" text-anchor="middle" fill="#00BCD4" font-family="sans-serif" font-size="16" font-weight="bold">Software scales in milliseconds. Power plants take 5 years. White-collar winter arrives before blue-collar.</text>

  <!-- Bottom insight -->
  <text x="600" y="760" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="14">These frictions slow the pace, not the direction. Every bottleneck has a clear resolution path.</text>

  <!-- Sources -->
  <text x="600" y="795" text-anchor="middle" fill="#444444" font-family="sans-serif" font-size="10">Sources: S&amp;P Global · Gartner Hype Cycle (2025) · MIT · Epoch AI · EU AI Act · Baker McKenzie</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <marker id="arrMG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888888"/>
    </marker>
    <marker id="arrMC" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00BCD4"/>
    </marker>
  </defs>
  <rect width="1200" height="800" fill="#0A0A0A"/>

  <!-- Title -->
  <text x="600" y="55" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="28" font-weight="bold">Marx's Vision vs Actual Path to "Communism"</text>

  <!-- Divider -->
  <line x1="600" y1="110" x2="600" y2="720" stroke="#333333" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- LEFT: Marx's Vision -->
  <text x="300" y="140" text-anchor="middle" fill="#FF4444" font-family="sans-serif" font-size="22" font-weight="bold">Marx's Original Vision</text>

  <!-- Flow: vertical -->
  <rect x="130" y="195" width="340" height="55" rx="10" fill="#FF4444" fill-opacity="0.1" stroke="#FF4444" stroke-width="1.5"/>
  <text x="300" y="225" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="15">Capitalist contradictions intensify</text>

  <line x1="300" y1="255" x2="300" y2="280" stroke="#888888" stroke-width="1.5" marker-end="url(#arrMG)"/>

  <rect x="130" y="285" width="340" height="55" rx="10" fill="#FF4444" fill-opacity="0.1" stroke="#FF4444" stroke-width="1.5"/>
  <text x="300" y="318" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="15">Proletariat awakens</text>

  <line x1="300" y1="345" x2="300" y2="370" stroke="#888888" stroke-width="1.5" marker-end="url(#arrMG)"/>

  <rect x="130" y="375" width="340" height="55" rx="10" fill="#FF4444" fill-opacity="0.1" stroke="#FF4444" stroke-width="1.5"/>
  <text x="300" y="408" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="15">Violent revolution overthrows bourgeoisie</text>

  <line x1="300" y1="435" x2="300" y2="460" stroke="#888888" stroke-width="1.5" marker-end="url(#arrMG)"/>

  <rect x="130" y="465" width="340" height="55" rx="10" fill="#FF4444" fill-opacity="0.1" stroke="#FF4444" stroke-width="1.5"/>
  <text x="300" y="498" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="15">Public ownership of production</text>

  <line x1="300" y1="525" x2="300" y2="550" stroke="#888888" stroke-width="1.5" marker-end="url(#arrMG)"/>

  <rect x="130" y="555" width="340" height="70" rx="10" fill="#FF4444" fill-opacity="0.15" stroke="#FF4444" stroke-width="2"/>
  <text x="300" y="588" text-anchor="middle" fill="#FF4444" font-family="sans-serif" font-size="18" font-weight="bold">Communist Utopia</text>
  <text x="300" y="612" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="12">Abundance + equality</text>

  <!-- RIGHT: Actual Path -->
  <text x="900" y="140" text-anchor="middle" fill="#00BCD4" font-family="sans-serif" font-size="22" font-weight="bold">What's Actually Happening</text>

  <rect x="730" y="195" width="340" height="55" rx="10" fill="#00BCD4" fill-opacity="0.1" stroke="#00BCD4" stroke-width="1.5"/>
  <text x="900" y="225" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="15">AI technology grows exponentially</text>

  <line x1="900" y1="255" x2="900" y2="280" stroke="#00BCD4" stroke-width="1.5" marker-end="url(#arrMC)"/>

  <rect x="730" y="285" width="340" height="55" rx="10" fill="#00BCD4" fill-opacity="0.1" stroke="#00BCD4" stroke-width="1.5"/>
  <text x="900" y="318" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="15">Machines replace human labor</text>

  <line x1="900" y1="345" x2="900" y2="370" stroke="#00BCD4" stroke-width="1.5" marker-end="url(#arrMC)"/>

  <rect x="730" y="375" width="340" height="55" rx="10" fill="#00BCD4" fill-opacity="0.1" stroke="#00BCD4" stroke-width="1.5"/>
  <text x="900" y="408" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="15">Material abundance (produced by AI)</text>

  <line x1="900" y1="435" x2="900" y2="460" stroke="#00BCD4" stroke-width="1.5" marker-end="url(#arrMC)"/>

  <rect x="730" y="465" width="340" height="55" rx="10" fill="#FF9800" fill-opacity="0.1" stroke="#FF9800" stroke-width="1.5"/>
  <text x="900" y="498" text-anchor="middle" fill="#FF9800" font-family="sans-serif" font-size="15">"To each their need"...but humans are guests</text>

  <line x1="900" y1="525" x2="900" y2="550" stroke="#00BCD4" stroke-width="1.5" marker-end="url(#arrMC)"/>

  <rect x="730" y="555" width="340" height="70" rx="10" fill="#00BCD4" fill-opacity="0.15" stroke="#00BCD4" stroke-width="2"/>
  <text x="900" y="585" text-anchor="middle" fill="#00BCD4" font-family="sans-serif" font-size="18" font-weight="bold">"Communism"...delivered by machines</text>
  <text x="900" y="612" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="12">Not by revolution</text>

  <!-- Key difference box -->
  <rect x="250" y="660" width="700" height="65" rx="12" fill="#FF9800" fill-opacity="0.1" stroke="#FF9800" stroke-width="1"/>
  <text x="600" y="688" text-anchor="middle" fill="#FF9800" font-family="sans-serif" font-size="16" font-weight="bold">Like pets: loved, cared for, but excluded from decision-making</text>

  <!-- Bottom question -->
  <text x="600" y="765" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="14">Is this tragedy or triumph?</text>
</svg>
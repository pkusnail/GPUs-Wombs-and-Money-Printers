<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <rect width="1200" height="800" fill="#0A0A0A"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="26" font-weight="bold">AI Militarization: Compute = Firepower</text>

  <!-- LEFT: Military AI Budgets -->
  <text x="300" y="125" text-anchor="middle" fill="#FF4444" font-family="sans-serif" font-size="20" font-weight="bold">Military AI Budgets (2026)</text>

  <!-- US -->
  <text x="100" y="175" fill="#FFFFFF" font-family="sans-serif" font-size="14">USA</text>
  <rect x="240" y="158" width="268" height="28" rx="4" fill="#2196F3" opacity="0.8"/>
  <text x="520" y="178" fill="#2196F3" font-family="sans-serif" font-size="14" font-weight="bold">$13.4B</text>

  <!-- China -->
  <text x="100" y="215" fill="#FFFFFF" font-family="sans-serif" font-size="14">China</text>
  <rect x="240" y="198" width="300" height="28" rx="4" fill="#FF4444" opacity="0.7"/>
  <text x="550" y="218" fill="#FF4444" font-family="sans-serif" font-size="14" font-weight="bold">~$15B</text>

  <!-- Israel -->
  <text x="100" y="255" fill="#FFFFFF" font-family="sans-serif" font-size="14">Israel</text>
  <rect x="240" y="238" width="25" height="28" rx="4" fill="#FF9800" opacity="0.7"/>
  <text x="275" y="258" fill="#FF9800" font-family="sans-serif" font-size="14">$12.5B increment</text>

  <!-- Germany -->
  <text x="100" y="295" fill="#FFFFFF" font-family="sans-serif" font-size="14">Germany</text>
  <rect x="240" y="278" width="24" height="28" rx="4" fill="#00BCD4" opacity="0.6"/>
  <text x="275" y="298" fill="#00BCD4" font-family="sans-serif" font-size="14">$12B drones</text>

  <text x="300" y="340" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="11">US FY2026 total defense budget: $1.01T</text>

  <!-- RIGHT: AI in Combat -->
  <text x="850" y="125" text-anchor="middle" fill="#FF9800" font-family="sans-serif" font-size="20" font-weight="bold">AI in Active Combat</text>

  <!-- Lavender -->
  <rect x="620" y="155" width="500" height="190" rx="10" fill="#FF4444" fill-opacity="0.08" stroke="#FF4444" stroke-width="1.5"/>
  <text x="640" y="185" fill="#FF4444" font-family="sans-serif" font-size="18" font-weight="bold">Israel's Lavender System</text>

  <text x="640" y="215" fill="#FFFFFF" font-family="sans-serif" font-size="13">Analyzed: 2.3 million Gaza residents</text>
  <text x="640" y="240" fill="#FFFFFF" font-family="sans-serif" font-size="13">Marked targets: <tspan fill="#FF4444" font-weight="bold">37,000 people</tspan></text>
  <text x="640" y="265" fill="#FFFFFF" font-family="sans-serif" font-size="13">Approval time: <tspan fill="#FF4444" font-weight="bold">20 sec/person</tspan> (virtually no human review)</text>
  <text x="640" y="290" fill="#FFFFFF" font-family="sans-serif" font-size="13">False-positive rate: <tspan fill="#FF9800" font-weight="bold">~10%</tspan> · Allowed civilian collateral: <tspan fill="#FF4444" font-weight="bold">15-20/target</tspan></text>
  <text x="640" y="315" fill="#888888" font-family="sans-serif" font-size="12">Generated in days = one year of manual work</text>
  <text x="640" y="338" fill="#555555" font-family="sans-serif" font-size="10">Source: 972 Magazine, April 2024</text>

  <!-- MIDDLE: Proliferation -->
  <text x="600" y="385" text-anchor="middle" fill="#00BCD4" font-family="sans-serif" font-size="20" font-weight="bold">AI Weapon Proliferation</text>

  <rect x="80" y="405" width="340" height="80" rx="8" fill="#FF9800" fill-opacity="0.06" stroke="#FF9800" stroke-width="1"/>
  <text x="100" y="433" fill="#FFFFFF" font-family="sans-serif" font-size="14" font-weight="bold">Ukraine Drones</text>
  <text x="100" y="458" fill="#FF9800" font-family="sans-serif" font-size="13">2024: 2.2M units → 2025: <tspan font-weight="bold">4.5M units</tspan></text>
  <text x="100" y="478" fill="#888888" font-family="sans-serif" font-size="11">AI autonomous target lock-on</text>

  <rect x="440" y="405" width="340" height="80" rx="8" fill="#2196F3" fill-opacity="0.06" stroke="#2196F3" stroke-width="1"/>
  <text x="460" y="433" fill="#FFFFFF" font-family="sans-serif" font-size="14" font-weight="bold">Military Drone Makers</text>
  <text x="460" y="458" fill="#2196F3" font-family="sans-serif" font-size="13">2022: 6 firms → 2024: <tspan font-weight="bold">200+ firms</tspan></text>
  <text x="460" y="478" fill="#888888" font-family="sans-serif" font-size="11">33x growth in 2 years</text>

  <rect x="800" y="405" width="320" height="80" rx="8" fill="#FF4444" fill-opacity="0.06" stroke="#FF4444" stroke-width="1"/>
  <text x="820" y="433" fill="#FFFFFF" font-family="sans-serif" font-size="14" font-weight="bold">AI Cyberattacks</text>
  <text x="820" y="458" fill="#FF4444" font-family="sans-serif" font-size="13">2025: <tspan font-weight="bold">28M+ incidents</tspan> (+72% YoY)</text>
  <text x="820" y="478" fill="#888888" font-family="sans-serif" font-size="11">39% state-sponsored</text>

  <!-- US Systems -->
  <rect x="80" y="505" width="1040" height="95" rx="10" fill="#2196F3" fill-opacity="0.06" stroke="#2196F3" stroke-width="1"/>
  <text x="100" y="533" fill="#2196F3" font-family="sans-serif" font-size="16" font-weight="bold">US AI Weapons Programs</text>
  <text x="100" y="560" fill="#FFFFFF" font-family="sans-serif" font-size="12">CCA "Loyal Wingman": ~1,000 autonomous combat drones (2 prototypes in testing)</text>
  <text x="100" y="580" fill="#FFFFFF" font-family="sans-serif" font-size="12">LRASM C-3: AI autonomous anti-ship missile, range doubled to ~1,600km · Replicator: thousands of cheap autonomous systems · Maven: LLM-driven 100% machine intelligence</text>

  <!-- BOTTOM: The Key Danger -->
  <rect x="80" y="620" width="1040" height="80" rx="12" fill="#FF4444" fill-opacity="0.08" stroke="#FF4444" stroke-width="1.5"/>
  <text x="600" y="650" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="18" font-weight="bold">AI makes war "easy" — and that is the greatest danger to peace</text>
  <text x="600" y="678" text-anchor="middle" fill="#FF9800" font-family="sans-serif" font-size="13">Autonomous weapons eliminate domestic casualties → political threshold for force drops drastically</text>
  <text x="600" y="698" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="11">No more "whose kid goes to war" opposition</text>

  <!-- Bottom insight -->
  <text x="600" y="745" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="14">Weak nations' AI military budgets = a fraction of strong nations'. The gap grows exponentially.</text>

  <!-- Sources -->
  <text x="600" y="795" text-anchor="middle" fill="#444444" font-family="sans-serif" font-size="10">Sources: CDO Magazine · 972 Magazine · Atlantic Council · DefenseScoop · Anthropic · Arms Control Assoc.</text>
</svg>
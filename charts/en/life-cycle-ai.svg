<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 600" width="1400" height="600">
  <rect width="1400" height="600" fill="#0A0A0A"/>

  <!-- Title -->
  <text x="700" y="50" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="28" font-weight="bold">AI Reshapes a Human Life: From Cradle to Grave</text>

  <!-- Timeline axis -->
  <line x1="80" y1="300" x2="1320" y2="300" stroke="#444444" stroke-width="2"/>
  <!-- Arrow -->
  <polygon points="1320,295 1340,300 1320,305" fill="#444444"/>

  <!-- Stage 1: 0-5 AI Nanny -->
  <rect x="90" y="140" width="150" height="130" rx="12" fill="#E91E63" fill-opacity="0.1" stroke="#E91E63" stroke-width="1.5"/>
  <text x="165" y="170" text-anchor="middle" fill="#E91E63" font-family="sans-serif" font-size="16" font-weight="bold">Age 0-5</text>
  <text x="165" y="195" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="13">AI Nanny/Tutor</text>
  <text x="165" y="225" text-anchor="middle" fill="#E91E63" font-family="sans-serif" font-size="11">Always patient</text>
  <text x="165" y="245" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="10">Never tired</text>
  <circle cx="165" cy="300" r="6" fill="#E91E63"/>

  <!-- Stage 2: 6-18 AI Education -->
  <rect x="260" y="140" width="150" height="130" rx="12" fill="#FF9800" fill-opacity="0.1" stroke="#FF9800" stroke-width="1.5"/>
  <text x="335" y="170" text-anchor="middle" fill="#FF9800" font-family="sans-serif" font-size="16" font-weight="bold">Age 6-18</text>
  <text x="335" y="195" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="13">AI Personalized Education</text>
  <text x="335" y="225" text-anchor="middle" fill="#FF9800" font-family="sans-serif" font-size="11">Degrees devalued</text>
  <text x="335" y="245" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="10">School becomes social</text>
  <circle cx="335" cy="300" r="6" fill="#FF9800"/>

  <!-- Stage 3: 18-25 Micro-credentials -->
  <rect x="430" y="140" width="150" height="130" rx="12" fill="#FFC107" fill-opacity="0.1" stroke="#FFC107" stroke-width="1.5"/>
  <text x="505" y="170" text-anchor="middle" fill="#FFC107" font-family="sans-serif" font-size="16" font-weight="bold">Age 18-25</text>
  <text x="505" y="195" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="13">Stackable Credentials</text>
  <text x="505" y="225" text-anchor="middle" fill="#FFC107" font-family="sans-serif" font-size="11">Lifelong learning begins</text>
  <text x="505" y="245" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="10">No more 4-yr degrees</text>
  <circle cx="505" cy="300" r="6" fill="#FFC107"/>

  <!-- Stage 4: 25-40 Frequent pivots -->
  <rect x="600" y="140" width="150" height="130" rx="12" fill="#4CAF50" fill-opacity="0.1" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="675" y="170" text-anchor="middle" fill="#4CAF50" font-family="sans-serif" font-size="16" font-weight="bold">Age 25-40</text>
  <text x="675" y="195" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="13">Career Pivots + AI Partner</text>
  <text x="675" y="225" text-anchor="middle" fill="#4CAF50" font-family="sans-serif" font-size="11">Meaning crisis</text>
  <text x="675" y="245" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="10">Identity in flux</text>
  <circle cx="675" cy="300" r="6" fill="#4CAF50"/>

  <!-- Stage 5: 40-65 Work optional -->
  <rect x="770" y="140" width="150" height="130" rx="12" fill="#2196F3" fill-opacity="0.1" stroke="#2196F3" stroke-width="1.5"/>
  <text x="845" y="170" text-anchor="middle" fill="#2196F3" font-family="sans-serif" font-size="16" font-weight="bold">Age 40-65</text>
  <text x="845" y="195" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="13">Work Becomes Optional</text>
  <text x="845" y="225" text-anchor="middle" fill="#2196F3" font-family="sans-serif" font-size="11">Creativity paradox</text>
  <text x="845" y="245" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="10">Purpose without labor</text>
  <circle cx="845" cy="300" r="6" fill="#2196F3"/>

  <!-- Stage 6: 65-120 AI-extended lifespan -->
  <rect x="940" y="140" width="150" height="130" rx="12" fill="#9C27B0" fill-opacity="0.1" stroke="#9C27B0" stroke-width="1.5"/>
  <text x="1015" y="170" text-anchor="middle" fill="#9C27B0" font-family="sans-serif" font-size="16" font-weight="bold">Age 65-120</text>
  <text x="1015" y="195" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="13">AI-Extended Lifespan</text>
  <text x="1015" y="225" text-anchor="middle" fill="#9C27B0" font-family="sans-serif" font-size="11">Health inequality</text>
  <text x="1015" y="245" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="10">Longevity divide</text>
  <circle cx="1015" cy="300" r="6" fill="#9C27B0"/>

  <!-- Stage 7: After death -->
  <rect x="1110" y="140" width="150" height="130" rx="12" fill="#607D8B" fill-opacity="0.1" stroke="#607D8B" stroke-width="1.5"/>
  <text x="1185" y="170" text-anchor="middle" fill="#607D8B" font-family="sans-serif" font-size="16" font-weight="bold">After Death</text>
  <text x="1185" y="200" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="13">Digital Afterlife</text>
  <text x="1185" y="230" text-anchor="middle" fill="#607D8B" font-family="sans-serif" font-size="11">Death redefined</text>
  <text x="1185" y="250" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="10">AI clone lives on</text>
  <circle cx="1185" cy="300" r="6" fill="#607D8B"/>

  <!-- Bottom: AI Penetration Depth gradient bar -->
  <text x="700" y="370" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="14" font-weight="bold">AI Penetration Depth</text>
  <defs>
    <linearGradient id="penetration" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E91E63" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#4CAF50" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#607D8B" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <rect x="90" y="390" width="1230" height="20" rx="10" fill="url(#penetration)"/>
  <text x="90" y="430" fill="#888888" font-family="sans-serif" font-size="12">Assistive</text>
  <text x="1230" y="430" text-anchor="end" fill="#888888" font-family="sans-serif" font-size="12">Full takeover</text>

  <!-- Key insight -->
  <rect x="200" y="460" width="1000" height="70" rx="12" fill="#FF4444" fill-opacity="0.06" stroke="#FF4444" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="700" y="490" text-anchor="middle" fill="#FF4444" font-family="sans-serif" font-size="15" font-weight="bold">Core paradox at every stage: AI makes life easier, but makes existence emptier</text>
</svg>
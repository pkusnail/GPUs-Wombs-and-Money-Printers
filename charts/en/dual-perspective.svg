<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" width="1400" height="800">
  <rect width="1400" height="800" fill="#0A0A0A"/>

  <!-- Title -->
  <text x="700" y="50" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="28" font-weight="bold">Dual Perspective: One Life vs Eight Billion Fates</text>

  <!-- Divider line -->
  <line x1="700" y1="100" x2="700" y2="760" stroke="#333333" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- LEFT: Individual Perspective -->
  <text x="350" y="130" text-anchor="middle" fill="#2196F3" font-family="sans-serif" font-size="22" font-weight="bold">Individual: Life of Xiao Ming (born 2026)</text>

  <!-- Individual timeline items -->
  <rect x="60" y="180" width="580" height="50" rx="8" fill="#E91E63" fill-opacity="0.08" stroke="#E91E63" stroke-width="1"/>
  <text x="80" y="200" fill="#E91E63" font-family="sans-serif" font-size="13" font-weight="bold">Age 0-5</text>
  <text x="160" y="200" fill="#FFFFFF" font-family="sans-serif" font-size="13">AI nanny raises him; both parents work</text>

  <rect x="60" y="240" width="580" height="50" rx="8" fill="#FF9800" fill-opacity="0.08" stroke="#FF9800" stroke-width="1"/>
  <text x="80" y="260" fill="#FF9800" font-family="sans-serif" font-size="13" font-weight="bold">Age 6-18</text>
  <text x="160" y="260" fill="#FFFFFF" font-family="sans-serif" font-size="13">AI tutor 1-on-1; school becomes social venue</text>

  <rect x="60" y="300" width="580" height="50" rx="8" fill="#FFC107" fill-opacity="0.08" stroke="#FFC107" stroke-width="1"/>
  <text x="80" y="320" fill="#FFC107" font-family="sans-serif" font-size="13" font-weight="bold">Age 18-22</text>
  <text x="170" y="320" fill="#FFFFFF" font-family="sans-serif" font-size="13">Micro-credentials replace 4-year degree</text>

  <rect x="60" y="360" width="580" height="50" rx="8" fill="#4CAF50" fill-opacity="0.08" stroke="#4CAF50" stroke-width="1"/>
  <text x="80" y="380" fill="#4CAF50" font-family="sans-serif" font-size="13" font-weight="bold">Age 22-35</text>
  <text x="170" y="380" fill="#FFFFFF" font-family="sans-serif" font-size="13">Career pivot every 2 years; AI companion fills void</text>

  <rect x="60" y="420" width="580" height="50" rx="8" fill="#2196F3" fill-opacity="0.08" stroke="#2196F3" stroke-width="1"/>
  <text x="80" y="440" fill="#2196F3" font-family="sans-serif" font-size="13" font-weight="bold">Age 35-60</text>
  <text x="170" y="440" fill="#FFFFFF" font-family="sans-serif" font-size="13">Work becomes optional; searching for meaning</text>

  <rect x="60" y="480" width="580" height="50" rx="8" fill="#9C27B0" fill-opacity="0.08" stroke="#9C27B0" stroke-width="1"/>
  <text x="80" y="500" fill="#9C27B0" font-family="sans-serif" font-size="13" font-weight="bold">Age 60-120</text>
  <text x="170" y="500" fill="#FFFFFF" font-family="sans-serif" font-size="13">AI extends life; pension exhausted decades ago</text>

  <rect x="60" y="540" width="580" height="50" rx="8" fill="#607D8B" fill-opacity="0.08" stroke="#607D8B" stroke-width="1"/>
  <text x="80" y="560" fill="#607D8B" font-family="sans-serif" font-size="13" font-weight="bold">After death</text>
  <text x="170" y="560" fill="#FFFFFF" font-family="sans-serif" font-size="13">Digital afterlife — AI Xiao Ming lives on</text>

  <!-- RIGHT: Collective Perspective -->
  <text x="1050" y="130" text-anchor="middle" fill="#FF9800" font-family="sans-serif" font-size="22" font-weight="bold">Collective: Structural Transformation</text>

  <!-- Society transformation items -->
  <rect x="760" y="180" width="580" height="70" rx="8" fill="#2196F3" fill-opacity="0.08" stroke="#2196F3" stroke-width="1"/>
  <text x="780" y="205" fill="#2196F3" font-family="sans-serif" font-size="14" font-weight="bold">Employment</text>
  <text x="780" y="228" fill="#FFFFFF" font-family="sans-serif" font-size="13">"Must work" → "Choose to work"</text>

  <rect x="760" y="260" width="580" height="70" rx="8" fill="#FF9800" fill-opacity="0.08" stroke="#FF9800" stroke-width="1"/>
  <text x="780" y="285" fill="#FF9800" font-family="sans-serif" font-size="14" font-weight="bold">Education</text>
  <text x="780" y="308" fill="#FFFFFF" font-family="sans-serif" font-size="13">"One-time degree" → "Lifetime subscription"</text>

  <rect x="760" y="340" width="580" height="70" rx="8" fill="#4CAF50" fill-opacity="0.08" stroke="#4CAF50" stroke-width="1"/>
  <text x="780" y="365" fill="#4CAF50" font-family="sans-serif" font-size="14" font-weight="bold">Family</text>
  <text x="780" y="388" fill="#FFFFFF" font-family="sans-serif" font-size="13">"Economic unit" → "Emotional choice"</text>

  <rect x="760" y="420" width="580" height="70" rx="8" fill="#9C27B0" fill-opacity="0.08" stroke="#9C27B0" stroke-width="1"/>
  <text x="780" y="445" fill="#9C27B0" font-family="sans-serif" font-size="14" font-weight="bold">Cities</text>
  <text x="780" y="468" fill="#FFFFFF" font-family="sans-serif" font-size="13">"Work hubs" → "Experience hubs"</text>

  <rect x="760" y="500" width="580" height="70" rx="8" fill="#FF4444" fill-opacity="0.08" stroke="#FF4444" stroke-width="1"/>
  <text x="780" y="525" fill="#FF4444" font-family="sans-serif" font-size="14" font-weight="bold">Nations</text>
  <text x="780" y="548" fill="#FFFFFF" font-family="sans-serif" font-size="13">"Labor competition" → "Compute competition"</text>

  <rect x="760" y="580" width="580" height="70" rx="8" fill="#E91E63" fill-opacity="0.08" stroke="#E91E63" stroke-width="1"/>
  <text x="780" y="605" fill="#E91E63" font-family="sans-serif" font-size="14" font-weight="bold">Species</text>
  <text x="780" y="628" fill="#FFFFFF" font-family="sans-serif" font-size="13">"Single species" → Enhanced / Natural / AI coexist</text>

  <!-- Bottom insight -->
  <rect x="200" y="690" width="1000" height="70" rx="12" fill="#FF4444" fill-opacity="0.06" stroke="#FF4444" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="700" y="718" text-anchor="middle" fill="#FF4444" font-family="sans-serif" font-size="15" font-weight="bold">Individual emptiness x Structural upheaval = Civilizational phase transition</text>
</svg>
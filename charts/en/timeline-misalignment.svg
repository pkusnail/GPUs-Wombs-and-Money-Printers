<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#00BCD4"/>
    </marker>
  </defs>
  <rect width="1200" height="800" fill="#0A0A0A"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="26" font-weight="bold">Jobs Crash First, Fiscal Squeeze Follows, Longevity Diffuses Last</text>

  <!-- Time axis -->
  <line x1="120" y1="520" x2="1080" y2="520" stroke="#333333" stroke-width="2"/>

  <!-- Axis labels -->
  <text x="120" y="545" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="13">2025</text>
  <text x="312" y="545" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="13">2028</text>
  <text x="504" y="545" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="13">2030</text>
  <text x="696" y="545" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="13">2035</text>
  <text x="888" y="545" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="13">2040</text>
  <text x="1080" y="545" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="13">2045</text>

  <!-- Tick marks -->
  <line x1="120" y1="515" x2="120" y2="525" stroke="#555555" stroke-width="1"/>
  <line x1="312" y1="515" x2="312" y2="525" stroke="#555555" stroke-width="1"/>
  <line x1="504" y1="515" x2="504" y2="525" stroke="#555555" stroke-width="1"/>
  <line x1="696" y1="515" x2="696" y2="525" stroke="#555555" stroke-width="1"/>
  <line x1="888" y1="515" x2="888" y2="525" stroke="#555555" stroke-width="1"/>
  <line x1="1080" y1="515" x2="1080" y2="525" stroke="#555555" stroke-width="1"/>

  <!-- Layer 1: Employment Displacement 2028-2035 -->
  <rect x="312" y="160" width="384" height="80" rx="10" fill="#FF4444" fill-opacity="0.1" stroke="#FF4444" stroke-width="1.5"/>
  <text x="332" y="190" fill="#FF4444" font-family="sans-serif" font-size="18" font-weight="bold">Employment Displacement</text>
  <text x="332" y="215" fill="#FFFFFF" font-family="sans-serif" font-size="13">2028–2035: White-collar/driver/warehouse jobs contract sharply</text>
  <text x="332" y="233" fill="#888888" font-family="sans-serif" font-size="11">Agents deployed · AV scales · Middlemen vanish</text>
  <!-- Connector to axis -->
  <line x1="312" y1="240" x2="312" y2="515" stroke="#FF4444" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="696" y1="240" x2="696" y2="515" stroke="#FF4444" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- Layer 2: Fiscal / Pension Squeeze 2030-2045 -->
  <rect x="504" y="280" width="576" height="80" rx="10" fill="#FF9800" fill-opacity="0.1" stroke="#FF9800" stroke-width="1.5"/>
  <text x="524" y="310" fill="#FF9800" font-family="sans-serif" font-size="18" font-weight="bold">Fiscal/Pension Squeeze</text>
  <text x="524" y="335" fill="#FFFFFF" font-family="sans-serif" font-size="13">2030–2045: Shrinking tax base + longer retirement = double squeeze</text>
  <text x="524" y="353" fill="#888888" font-family="sans-serif" font-size="11">Wage tax revenue ↓ · Aging pop ↑ · Social security under pressure</text>
  <!-- Connector to axis -->
  <line x1="504" y1="360" x2="504" y2="515" stroke="#FF9800" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="1080" y1="360" x2="1080" y2="515" stroke="#FF9800" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- Layer 3: Longevity Diffusion 2040+ -->
  <rect x="888" y="400" width="192" height="80" rx="10" fill="#2196F3" fill-opacity="0.1" stroke="#2196F3" stroke-width="1.5"/>
  <text x="908" y="430" fill="#2196F3" font-family="sans-serif" font-size="18" font-weight="bold">Longevity Diffusion</text>
  <text x="908" y="450" fill="#FFFFFF" font-family="sans-serif" font-size="13">2040+: High-cost therapies</text>
  <text x="908" y="468" fill="#888888" font-family="sans-serif" font-size="11">gradually trickle down →</text>
  <!-- Right fade arrow -->
  <line x1="1080" y1="440" x2="1140" y2="440" stroke="#2196F3" stroke-width="2" stroke-dasharray="6,4" opacity="0.6"/>
  <!-- Connector to axis -->
  <line x1="888" y1="480" x2="888" y2="515" stroke="#2196F3" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- Gap annotation: the dangerous window -->
  <line x1="350" y1="125" x2="850" y2="125" stroke="#00BCD4" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="430" y="100" width="320" height="28" rx="6" fill="#0A0A0A"/>
  <text x="590" y="120" text-anchor="middle" fill="#00BCD4" font-family="sans-serif" font-size="14" font-weight="bold">Gap: Jobs gone, longevity not yet accessible</text>

  <!-- Stagger visualization -->
  <text x="100" y="195" text-anchor="end" fill="#FF4444" font-family="sans-serif" font-size="13" font-weight="bold">First</text>
  <text x="100" y="315" text-anchor="end" fill="#FF9800" font-family="sans-serif" font-size="13" font-weight="bold">Then</text>
  <text x="100" y="435" text-anchor="end" fill="#2196F3" font-family="sans-serif" font-size="13" font-weight="bold">Last</text>

  <!-- Bottom insight -->
  <rect x="80" y="590" width="1040" height="80" rx="10" fill="#FF4444" fill-opacity="0.08" stroke="#FF4444" stroke-width="1"/>
  <text x="600" y="620" text-anchor="middle" fill="#FF4444" font-family="sans-serif" font-size="16" font-weight="bold">Living longer, but first surviving a gap with no stable income or safety net</text>
  <text x="600" y="645" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="13">The issue isn't longevity itself — it's whether value distribution and social security can keep pace with displacement speed</text>
  <text x="600" y="665" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="12">Living longer, but first surviving a gap with no stable income or safety net.</text>

  <!-- Sources -->
  <text x="600" y="780" text-anchor="middle" fill="#444444" font-family="sans-serif" font-size="10">Sources: McKinsey, IMF fiscal projections, Nature Aging timelines</text>
</svg>
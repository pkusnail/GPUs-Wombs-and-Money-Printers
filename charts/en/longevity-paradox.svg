<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <rect width="1200" height="800" fill="#0A0A0A"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="26" font-weight="bold">The Longevity Paradox: Living Longer, But Who Pays?</text>

  <!-- LEFT PANEL: Pension Insolvency Timeline -->
  <text x="300" y="125" text-anchor="middle" fill="#FF4444" font-family="sans-serif" font-size="20" font-weight="bold">Pension Insolvency</text>

  <!-- Timeline bar -->
  <line x1="80" y1="200" x2="520" y2="200" stroke="#333333" stroke-width="2"/>
  <text x="80" y="190" fill="#888888" font-family="sans-serif" font-size="11">2025</text>
  <text x="520" y="190" text-anchor="end" fill="#888888" font-family="sans-serif" font-size="11">2040</text>

  <!-- US -->
  <rect x="80" y="220" width="440" height="70" rx="8" fill="#FF4444" fill-opacity="0.06" stroke="#FF4444" stroke-width="1"/>
  <text x="100" y="248" fill="#FFFFFF" font-family="sans-serif" font-size="15" font-weight="bold">🇺🇸 US Social Security</text>
  <text x="100" y="270" fill="#888888" font-family="sans-serif" font-size="12">Exhausted 2033-2034 → can only pay 77-81% benefits</text>
  <circle cx="370" cy="200" r="6" fill="#FF4444"/>
  <text x="370" y="215" text-anchor="middle" fill="#FF4444" font-family="sans-serif" font-size="10" font-weight="bold">2033</text>

  <!-- China -->
  <rect x="80" y="300" width="440" height="70" rx="8" fill="#FF9800" fill-opacity="0.06" stroke="#FF9800" stroke-width="1"/>
  <text x="100" y="328" fill="#FFFFFF" font-family="sans-serif" font-size="15" font-weight="bold">🇨🇳 China Pension</text>
  <text x="100" y="350" fill="#888888" font-family="sans-serif" font-size="12">~2035 depletion · Gap 8-10 trillion yuan</text>
  <circle cx="400" cy="200" r="6" fill="#FF9800"/>
  <text x="400" y="215" text-anchor="middle" fill="#FF9800" font-family="sans-serif" font-size="10" font-weight="bold">2035</text>

  <!-- Japan -->
  <rect x="80" y="380" width="440" height="70" rx="8" fill="#2196F3" fill-opacity="0.06" stroke="#2196F3" stroke-width="1"/>
  <text x="100" y="408" fill="#FFFFFF" font-family="sans-serif" font-size="15" font-weight="bold">🇯🇵 Japan</text>
  <text x="100" y="430" fill="#888888" font-family="sans-serif" font-size="12">2050 dependency ratio &gt;0.8 · &lt;1.25 workers per retiree</text>

  <!-- Worker ratio -->
  <rect x="80" y="465" width="440" height="55" rx="8" fill="#00BCD4" fill-opacity="0.06" stroke="#00BCD4" stroke-width="1"/>
  <text x="100" y="490" fill="#00BCD4" font-family="sans-serif" font-size="14" font-weight="bold">Worker:Retiree Ratio</text>
  <text x="100" y="510" fill="#888888" font-family="sans-serif" font-size="12">1960: 5.1:1 → 2025: 2.8:1 → 2040: 2.1:1 (needs ≥2.8 to function)</text>

  <!-- RIGHT PANEL: Longevity Impact -->
  <text x="850" y="125" text-anchor="middle" fill="#FF9800" font-family="sans-serif" font-size="20" font-weight="bold">Cost of Longevity</text>

  <!-- IMF finding -->
  <rect x="620" y="155" width="500" height="80" rx="10" fill="#FF9800" fill-opacity="0.08" stroke="#FF9800" stroke-width="1.5"/>
  <text x="870" y="185" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="18" font-weight="bold">Every +1 year of life = 3-5% more pension liability</text>
  <text x="870" y="210" text-anchor="middle" fill="#FF9800" font-family="sans-serif" font-size="14">(IMF)</text>

  <!-- Lifespan scenarios -->
  <text x="640" y="270" fill="#FFFFFF" font-family="sans-serif" font-size="14">Live to 80 (current)</text>
  <rect x="810" y="255" width="100" height="24" rx="3" fill="#2196F3" opacity="0.6"/>
  <text x="860" y="272" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="11">Baseline</text>

  <text x="640" y="310" fill="#FFFFFF" font-family="sans-serif" font-size="14">Live to 100</text>
  <rect x="810" y="295" width="200" height="24" rx="3" fill="#FF9800" opacity="0.7"/>
  <text x="910" y="312" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="11" font-weight="bold">Liability ×2</text>

  <text x="640" y="350" fill="#FF4444" font-family="sans-serif" font-size="14" font-weight="bold">Live to 120</text>
  <rect x="810" y="335" width="300" height="24" rx="3" fill="#FF4444" opacity="0.8"/>
  <text x="960" y="352" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="11" font-weight="bold">Liability ×3</text>

  <!-- Retirement duration -->
  <rect x="620" y="380" width="500" height="85" rx="10" fill="#FF4444" fill-opacity="0.06" stroke="#FF4444" stroke-width="1"/>
  <text x="640" y="405" fill="#FFFFFF" font-family="sans-serif" font-size="14" font-weight="bold">Retirement vs Work Duration</text>

  <text x="640" y="430" fill="#888888" font-family="sans-serif" font-size="13">Current: Work ~40 yrs, Retire ~15 yrs</text>
  <text x="640" y="450" fill="#FF4444" font-family="sans-serif" font-size="13" font-weight="bold">120 yrs: Work ~40 yrs, Retire ~55 yrs — Retirement longer than work</text>

  <!-- The affordability gap -->
  <rect x="620" y="480" width="500" height="75" rx="10" fill="#00BCD4" fill-opacity="0.06" stroke="#00BCD4" stroke-width="1"/>
  <text x="640" y="505" fill="#00BCD4" font-family="sans-serif" font-size="14" font-weight="bold">💰 Price of Longevity</text>
  <text x="640" y="528" fill="#888888" font-family="sans-serif" font-size="12">CAR-T: &gt;$1,000,000 · Immunotherapy: $150-200K/yr</text>
  <text x="640" y="548" fill="#888888" font-family="sans-serif" font-size="12">US rich-poor health lifespan gap: 7-9 yrs · Global: Norway 83 vs Chad 52</text>

  <!-- BOTTOM: The Paradox Loop -->
  <rect x="80" y="575" width="1040" height="100" rx="12" fill="#FF4444" fill-opacity="0.08" stroke="#FF4444" stroke-width="1.5"/>
  <text x="600" y="605" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="18" font-weight="bold">The AI-Longevity Paradox</text>

  <text x="600" y="640" text-anchor="middle" fill="#FF9800" font-family="sans-serif" font-size="14">AI accelerates medicine → people live longer → pension gap grows → but AI cuts workers who fund pensions → gap accelerates</text>

  <!-- Bottom insight -->
  <text x="600" y="720" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="14">Pensions tax human labor. AI shifts value creation from labor to capital — robots don't pay Social Security.</text>

  <!-- Sources -->
  <text x="600" y="785" text-anchor="middle" fill="#444444" font-family="sans-serif" font-size="10">Sources: SSA Trustees Report (2025) · IMF GFSR (2012) · CASS · The Diplomat (2026) · NEJM · MIT Tech Review</text>
</svg>
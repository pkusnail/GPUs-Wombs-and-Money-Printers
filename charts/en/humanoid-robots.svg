<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <rect width="1200" height="800" fill="#0A0A0A"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="26" font-weight="bold">Humanoid Robots: China's Hardware Dominance (2025)</text>

  <!-- LEFT PANEL: Market Share -->
  <text x="300" y="125" text-anchor="middle" fill="#FF9800" font-family="sans-serif" font-size="20" font-weight="bold">Global Shipment Share</text>

  <!-- Big donut-style visual: China 90% -->
  <circle cx="300" cy="310" r="130" fill="none" stroke="#333333" stroke-width="40"/>
  <circle cx="300" cy="310" r="130" fill="none" stroke="#FF4444" stroke-width="40" stroke-dasharray="735 82" stroke-dashoffset="204" opacity="0.8"/>
  <circle cx="300" cy="310" r="130" fill="none" stroke="#2196F3" stroke-width="40" stroke-dasharray="82 735" stroke-dashoffset="204" opacity="0.6"/>

  <text x="300" y="295" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="48" font-weight="bold">~90%</text>
  <text x="300" y="330" text-anchor="middle" fill="#FF4444" font-family="sans-serif" font-size="16">Made in China</text>

  <!-- Legend -->
  <rect x="180" y="470" width="16" height="16" rx="2" fill="#FF4444" opacity="0.8"/>
  <text x="204" y="484" fill="#FFFFFF" font-family="sans-serif" font-size="13">China ~90%</text>
  <rect x="340" y="470" width="16" height="16" rx="2" fill="#2196F3" opacity="0.6"/>
  <text x="364" y="484" fill="#FFFFFF" font-family="sans-serif" font-size="13">Others ~10%</text>

  <!-- Key players -->
  <rect x="100" y="510" width="400" height="155" rx="10" fill="#FF4444" fill-opacity="0.06" stroke="#FF4444" stroke-width="1"/>
  <text x="120" y="538" fill="#FF9800" font-family="sans-serif" font-size="14" font-weight="bold">Key Players (2025)</text>

  <text x="120" y="565" fill="#FFFFFF" font-family="sans-serif" font-size="13">AgiBot</text>
  <text x="380" y="565" text-anchor="end" fill="#FF4444" font-family="sans-serif" font-size="13" font-weight="bold">5,168 units</text>

  <text x="120" y="590" fill="#FFFFFF" font-family="sans-serif" font-size="13">Unitree</text>
  <text x="380" y="590" text-anchor="end" fill="#FF4444" font-family="sans-serif" font-size="13" font-weight="bold">5,500+ units</text>

  <text x="120" y="615" fill="#FFFFFF" font-family="sans-serif" font-size="13">UBTECH</text>
  <text x="380" y="615" text-anchor="end" fill="#FF4444" font-family="sans-serif" font-size="13" font-weight="bold">Shipping</text>

  <text x="120" y="645" fill="#888888" font-family="sans-serif" font-size="13">Tesla Optimus</text>
  <text x="380" y="645" text-anchor="end" fill="#888888" font-family="sans-serif" font-size="13">Not yet sold</text>

  <text x="300" y="680" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="11">140+ companies, 330+ models</text>

  <!-- RIGHT PANEL: Bottlenecks -->
  <text x="850" y="125" text-anchor="middle" fill="#FF4444" font-family="sans-serif" font-size="20" font-weight="bold">Key Bottlenecks</text>

  <!-- Bottleneck 1: Data Gap -->
  <rect x="620" y="155" width="460" height="160" rx="10" fill="#FF9800" fill-opacity="0.06" stroke="#FF9800" stroke-width="1"/>
  <text x="650" y="185" fill="#FF9800" font-family="sans-serif" font-size="16" font-weight="bold">The Data Gap</text>

  <text x="650" y="215" fill="#FFFFFF" font-family="sans-serif" font-size="13">Language data</text>
  <rect x="840" y="200" width="220" height="22" rx="3" fill="#00BCD4" opacity="0.7"/>
  <text x="955" y="216" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="11" font-weight="bold">100,000+ years of human text</text>

  <text x="650" y="255" fill="#FFFFFF" font-family="sans-serif" font-size="13">Manipulation data</text>
  <rect x="840" y="240" width="8" height="22" rx="3" fill="#FF4444" opacity="0.8"/>
  <text x="860" y="256" fill="#FF4444" font-family="sans-serif" font-size="11" font-weight="bold">≈ 0</text>

  <text x="850" y="295" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="12">"ChatGPT writes perfect legal briefs, but a robot can't hold an egg steady"</text>
  <text x="850" y="313" text-anchor="middle" fill="#555555" font-family="sans-serif" font-size="11">— Ken Goldberg, UC Berkeley</text>

  <!-- Bottleneck 2: Battery -->
  <rect x="620" y="330" width="460" height="90" rx="10" fill="#2196F3" fill-opacity="0.06" stroke="#2196F3" stroke-width="1"/>
  <text x="650" y="358" fill="#2196F3" font-family="sans-serif" font-size="16" font-weight="bold">Battery Life</text>
  <text x="650" y="385" fill="#FFFFFF" font-family="sans-serif" font-size="14">Current: 2-3 hours/charge</text>
  <text x="650" y="408" fill="#888888" font-family="sans-serif" font-size="12">Industrial shift needs 8+ hrs</text>

  <!-- Bottleneck 3: Autonomy -->
  <rect x="620" y="435" width="460" height="90" rx="10" fill="#00BCD4" fill-opacity="0.06" stroke="#00BCD4" stroke-width="1"/>
  <text x="650" y="463" fill="#00BCD4" font-family="sans-serif" font-size="16" font-weight="bold">Autonomy</text>
  <text x="650" y="490" fill="#FFFFFF" font-family="sans-serif" font-size="14">Current: Pre-programmed + teleoperation</text>
  <text x="650" y="513" fill="#888888" font-family="sans-serif" font-size="12">Sim-to-real transfer needed</text>

  <!-- BOTTOM: Timeline projection -->
  <rect x="80" y="550" width="1040" height="110" rx="12" fill="#FF9800" fill-opacity="0.08" stroke="#FF9800" stroke-width="1.5"/>
  <text x="600" y="580" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="18" font-weight="bold">The Displacement Spiral Extends: From Cognitive to Physical</text>

  <text x="600" y="640" text-anchor="middle" fill="#FF9800" font-family="sans-serif" font-size="14">AI software cuts white-collar → white-collar downgrades to blue-collar → robots cut blue-collar → nowhere to go</text>

  <!-- Bottom insight -->
  <text x="600" y="720" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="14">US controls the brain of intelligence (GPUs). China controls the body (robot hardware).</text>

  <!-- Sources -->
  <text x="600" y="785" text-anchor="middle" fill="#444444" font-family="sans-serif" font-size="10">Sources: Pandaily(2026) · Reuters(2026) · IEEE Spectrum(2026) · UC Berkeley Robotics</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <rect width="1200" height="800" fill="#0A0A0A"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="26" font-weight="bold">The Economics of Marriage &amp; Children: When ROI Turns Negative</text>

  <!-- LEFT PANEL: Marriage Rate Decline -->
  <text x="300" y="125" text-anchor="middle" fill="#2196F3" font-family="sans-serif" font-size="20" font-weight="bold">Marriage Rate Collapse</text>

  <!-- China marriage data -->
  <rect x="80" y="155" width="440" height="200" rx="10" fill="#2196F3" fill-opacity="0.06" stroke="#2196F3" stroke-width="1"/>
  <text x="100" y="180" fill="#2196F3" font-family="sans-serif" font-size="16" font-weight="bold">China</text>

  <!-- Bar chart: China marriages declining -->
  <text x="145" y="215" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="10">2013</text>
  <rect x="120" y="225" width="50" height="110" rx="3" fill="#2196F3" opacity="0.8"/>
  <text x="145" y="350" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="11">13.47M</text>

  <text x="235" y="215" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="10">2019</text>
  <rect x="210" y="260" width="50" height="75" rx="3" fill="#2196F3" opacity="0.6"/>
  <text x="235" y="350" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="11">9.27M</text>

  <text x="325" y="215" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="10">2024</text>
  <rect x="300" y="290" width="50" height="45" rx="3" fill="#FF4444" opacity="0.8"/>
  <text x="325" y="350" text-anchor="middle" fill="#FF4444" font-family="sans-serif" font-size="11" font-weight="bold">6.1M</text>

  <text x="420" y="280" text-anchor="middle" fill="#FF4444" font-family="sans-serif" font-size="14" font-weight="bold">-55%</text>
  <text x="420" y="300" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="11">11-yr decline</text>
  <text x="300" y="345" text-anchor="middle" fill="#FF4444" font-family="sans-serif" font-size="10">Lowest since 1986</text>

  <!-- US + OECD -->
  <rect x="80" y="370" width="440" height="75" rx="10" fill="#FF9800" fill-opacity="0.06" stroke="#FF9800" stroke-width="1"/>
  <text x="100" y="395" fill="#FF9800" font-family="sans-serif" font-size="14" font-weight="bold">USA</text>
  <text x="100" y="415" fill="#888888" font-family="sans-serif" font-size="12">Marriage rate: 8.2 (2000) to 6.1 (2023) per 1,000 pop. -25%</text>
  <text x="100" y="435" fill="#888888" font-family="sans-serif" font-size="12">Median first marriage age rising steadily</text>

  <rect x="80" y="455" width="440" height="55" rx="10" fill="#00BCD4" fill-opacity="0.06" stroke="#00BCD4" stroke-width="1"/>
  <text x="100" y="478" fill="#00BCD4" font-family="sans-serif" font-size="14" font-weight="bold">OECD Average</text>
  <text x="100" y="498" fill="#888888" font-family="sans-serif" font-size="12">5.1 (2000) to 3.8 (2025) per 1,000 -25% · First marriage age 25 to 32</text>

  <!-- RIGHT PANEL: Child ROI -->
  <text x="900" y="125" text-anchor="middle" fill="#FF4444" font-family="sans-serif" font-size="20" font-weight="bold">Child-Rearing Cost vs Return</text>

  <rect x="680" y="155" width="440" height="360" rx="10" fill="#FF4444" fill-opacity="0.06" stroke="#FF4444" stroke-width="1"/>

  <!-- Cost comparison -->
  <text x="900" y="185" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="16" font-weight="bold">Cost to Raise a Child to 18 (x GDP per capita)</text>

  <!-- China bar -->
  <text x="720" y="250" fill="#FFFFFF" font-family="sans-serif" font-size="14">China</text>
  <rect x="810" y="235" width="252" height="30" rx="4" fill="#FF4444" opacity="0.7"/>
  <text x="1070" y="255" fill="#FF4444" font-family="sans-serif" font-size="14" font-weight="bold">6.3x</text>
  <text x="900" y="275" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="11">538K CNY/child · 2nd highest globally</text>

  <!-- US bar -->
  <text x="720" y="310" fill="#FFFFFF" font-family="sans-serif" font-size="14">USA</text>
  <rect x="810" y="295" width="164" height="30" rx="4" fill="#FF9800" opacity="0.7"/>
  <text x="982" y="315" fill="#FF9800" font-family="sans-serif" font-size="14" font-weight="bold">4.1x</text>

  <!-- France bar -->
  <text x="720" y="365" fill="#FFFFFF" font-family="sans-serif" font-size="14">France</text>
  <rect x="810" y="350" width="80" height="30" rx="4" fill="#2196F3" opacity="0.6"/>
  <text x="898" y="370" fill="#2196F3" font-family="sans-serif" font-size="14">2.0x</text>

  <!-- Sweden bar -->
  <text x="720" y="420" fill="#FFFFFF" font-family="sans-serif" font-size="14">Sweden</text>
  <rect x="810" y="405" width="60" height="30" rx="4" fill="#00BCD4" opacity="0.6"/>
  <text x="878" y="425" fill="#00BCD4" font-family="sans-serif" font-size="14">1.5x</text>

  <!-- The ROI shift -->
  <text x="900" y="470" text-anchor="middle" fill="#FF9800" font-family="sans-serif" font-size="13" font-weight="bold">Agricultural era: children = labor = positive ROI</text>
  <text x="900" y="510" text-anchor="middle" fill="#FF4444" font-family="sans-serif" font-size="13" font-weight="bold">AI era: children ≠ productivity = negative ROI</text>

  <!-- BOTTOM: Economic Logic Chain -->
  <rect x="80" y="555" width="1040" height="110" rx="12" fill="#FF9800" fill-opacity="0.08" stroke="#FF9800" stroke-width="1.5"/>
  <text x="600" y="585" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="18" font-weight="bold">The Economic Logic Chain Behind Marriage &amp; Fertility Collapse</text>

  <text x="600" y="625" text-anchor="middle" fill="#FF9800" font-family="sans-serif" font-size="14">AI replaces jobs → unstable income → delayed/no marriage → divorce up → birth will down → child ROI negative → pop. shrinks</text>

  <!-- Bottom insight -->
  <text x="600" y="720" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="14">This is not cultural — it's economic law. When productivity no longer needs population volume.</text>

  <!-- Sources -->
  <text x="600" y="785" text-anchor="middle" fill="#444444" font-family="sans-serif" font-size="10">Sources: China Ministry of Civil Affairs (2024) · CDC/NCHS (2023) · OECD Society at a Glance (2024) · YuWa Population Research (2024)</text>
</svg>
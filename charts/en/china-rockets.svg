<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <rect width="1200" height="800" fill="#0A0A0A"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="26" font-weight="bold">China's Reusable Rocket Race: Chasing SpaceX</text>

  <!-- Reference: SpaceX -->
  <rect x="80" y="105" width="1040" height="50" rx="8" fill="#2196F3" fill-opacity="0.1" stroke="#2196F3" stroke-width="1.5"/>
  <text x="100" y="135" fill="#2196F3" font-family="sans-serif" font-size="16" font-weight="bold">SpaceX Falcon 9 Reference</text>
  <text x="460" y="135" fill="#888888" font-family="sans-serif" font-size="13">22.8t LEO · First recovery 2015 · Single booster reused 25+ times · 300+ launches in 2025 · $2,720/kg</text>

  <!-- Company cards -->
  <!-- LandSpace -->
  <rect x="80" y="175" width="340" height="145" rx="10" fill="#FF4444" fill-opacity="0.06" stroke="#FF4444" stroke-width="1.5"/>
  <text x="100" y="200" fill="#FF4444" font-family="sans-serif" font-size="16" font-weight="bold">LandSpace</text>
  <text x="100" y="222" fill="#FFFFFF" font-family="sans-serif" font-size="13" font-weight="bold">Zhuque-3</text>
  <text x="100" y="244" fill="#FFFFFF" font-family="sans-serif" font-size="12">Payload: 21.3t LEO (Falcon 9 class)</text>
  <text x="100" y="264" fill="#FF9800" font-family="sans-serif" font-size="12">Dec 2025: Orbit success, recovery failed</text>
  <text x="100" y="284" fill="#888888" font-family="sans-serif" font-size="11">Next recovery: 2026 Q2 · Reflight target: Q4</text>
  <rect x="340" y="195" width="60" height="20" rx="4" fill="#FF9800" opacity="0.8"/>
  <text x="370" y="209" text-anchor="middle" fill="#0A0A0A" font-family="sans-serif" font-size="10" font-weight="bold">Closest</text>

  <!-- Space Pioneer -->
  <rect x="440" y="175" width="340" height="145" rx="10" fill="#FF9800" fill-opacity="0.06" stroke="#FF9800" stroke-width="1"/>
  <text x="460" y="200" fill="#FF9800" font-family="sans-serif" font-size="16" font-weight="bold">Space Pioneer</text>
  <text x="460" y="222" fill="#FFFFFF" font-family="sans-serif" font-size="13" font-weight="bold">Tianlong-3</text>
  <text x="460" y="244" fill="#FFFFFF" font-family="sans-serif" font-size="12">72m tall · 9 engines · 17-18t LEO</text>
  <text x="460" y="264" fill="#FF9800" font-family="sans-serif" font-size="12">Stainless steel body (like Starship) · Designed for 10 reuses</text>
  <text x="460" y="284" fill="#888888" font-family="sans-serif" font-size="11">Ready at Jiuquan · First flight: ~Mar 2026</text>
  <text x="460" y="308" fill="#2196F3" font-family="sans-serif" font-size="11" font-weight="bold">Funding: $350M · Annual production target: 30</text>

  <!-- iSpace -->
  <rect x="800" y="175" width="320" height="145" rx="10" fill="#00BCD4" fill-opacity="0.06" stroke="#00BCD4" stroke-width="1"/>
  <text x="820" y="200" fill="#00BCD4" font-family="sans-serif" font-size="16" font-weight="bold">iSpace</text>
  <text x="820" y="222" fill="#FFFFFF" font-family="sans-serif" font-size="13" font-weight="bold">Hyperbola-3</text>
  <text x="820" y="244" fill="#FFFFFF" font-family="sans-serif" font-size="12">69m tall · 8.5t LEO (reusable mode)</text>
  <text x="820" y="264" fill="#00BCD4" font-family="sans-serif" font-size="12">Completed 2 VTVL tests in 2023</text>
  <text x="820" y="284" fill="#888888" font-family="sans-serif" font-size="11">Sea recovery prep · 2026 first orbital flight</text>

  <!-- Galactic Energy -->
  <rect x="80" y="340" width="340" height="125" rx="10" fill="#888888" fill-opacity="0.06" stroke="#888888" stroke-width="1"/>
  <text x="100" y="365" fill="#888888" font-family="sans-serif" font-size="16" font-weight="bold">Galactic Energy</text>
  <text x="100" y="387" fill="#FFFFFF" font-family="sans-serif" font-size="13" font-weight="bold">Pallas-1</text>
  <text x="100" y="407" fill="#FFFFFF" font-family="sans-serif" font-size="12">7t LEO · Designed for 25 reuses</text>
  <text x="100" y="427" fill="#FF4444" font-family="sans-serif" font-size="12">Jan 17, 2026: First flight failed</text>
  <text x="100" y="447" fill="#888888" font-family="sans-serif" font-size="11">Funding: $336M · Needs to recover from failure</text>

  <!-- Long March 10 -->
  <rect x="440" y="340" width="340" height="125" rx="10" fill="#FF4444" fill-opacity="0.06" stroke="#FF4444" stroke-width="1"/>
  <text x="460" y="365" fill="#FF4444" font-family="sans-serif" font-size="16" font-weight="bold">State-Owned (CASC)</text>
  <text x="460" y="387" fill="#FFFFFF" font-family="sans-serif" font-size="13" font-weight="bold">Long March 10 Reusable Variant</text>
  <text x="460" y="407" fill="#FFFFFF" font-family="sans-serif" font-size="12">5m diameter · State resources backing</text>
  <text x="460" y="427" fill="#FF9800" font-family="sans-serif" font-size="12">Feb 2026: Low-altitude demo flight success</text>
  <text x="460" y="447" fill="#888888" font-family="sans-serif" font-size="11">Target: 2026 H1 first flight</text>

  <!-- More Players -->
  <rect x="800" y="340" width="320" height="125" rx="10" fill="#2196F3" fill-opacity="0.06" stroke="#2196F3" stroke-width="1"/>
  <text x="820" y="365" fill="#2196F3" font-family="sans-serif" font-size="16" font-weight="bold">More Players</text>
  <text x="820" y="390" fill="#FFFFFF" font-family="sans-serif" font-size="12">Deep Blue Aerospace · Nebula-1 · Multiple hover tests</text>
  <text x="820" y="410" fill="#FFFFFF" font-family="sans-serif" font-size="12">Orienspace · Gravity-2 · 25+t LEO</text>
  <text x="820" y="430" fill="#FFFFFF" font-family="sans-serif" font-size="12">CAS Space · Kinetica-2 · 12t LEO</text>
  <text x="820" y="452" fill="#888888" font-family="sans-serif" font-size="11">11+ reusable rocket programs in parallel</text>

  <!-- Funding -->
  <rect x="80" y="485" width="1040" height="60" rx="10" fill="#FF9800" fill-opacity="0.08" stroke="#FF9800" stroke-width="1.5"/>
  <text x="600" y="510" text-anchor="middle" fill="#FF9800" font-family="sans-serif" font-size="16" font-weight="bold">2025 Funding: 26.6B yuan ($3.8B) · 137 rounds · STAR Market fast-track IPO for reusable rocket firms</text>

  <!-- Gap Analysis -->
  <text x="600" y="580" text-anchor="middle" fill="#FF4444" font-family="sans-serif" font-size="20" font-weight="bold">How Big Is the Gap?</text>

  <rect x="80" y="600" width="500" height="55" rx="8" fill="#2196F3" fill-opacity="0.06" stroke="#2196F3" stroke-width="1"/>
  <text x="100" y="623" fill="#2196F3" font-family="sans-serif" font-size="14" font-weight="bold">SpaceX (2025)</text>
  <text x="100" y="643" fill="#888888" font-family="sans-serif" font-size="12">300+ launches · Single booster reused 25+ times · $2,720/kg · 60% global share</text>

  <text x="595" y="628" fill="#FF9800" font-family="sans-serif" font-size="20">vs</text>

  <rect x="620" y="600" width="500" height="55" rx="8" fill="#FF4444" fill-opacity="0.06" stroke="#FF4444" stroke-width="1"/>
  <text x="640" y="623" fill="#FF4444" font-family="sans-serif" font-size="14" font-weight="bold">China Commercial (2025)</text>
  <text x="640" y="643" fill="#888888" font-family="sans-serif" font-size="12">&lt;30 orbital launches (total) · 0 successful recoveries · ~10 years behind</text>

  <!-- Bottom Insight -->
  <rect x="80" y="675" width="1040" height="50" rx="10" fill="#00BCD4" fill-opacity="0.08" stroke="#00BCD4" stroke-width="1"/>
  <text x="600" y="705" text-anchor="middle" fill="#00BCD4" font-family="sans-serif" font-size="14" font-weight="bold">China doesn't need to "beat" SpaceX — just needs autonomous capability. Space access is the next strategic high ground after chips.</text>

  <!-- Bottom insight -->
  <text x="600" y="755" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="13">Mega-constellations create launch demand · Brute-force + policy support · Behind does not mean without opportunity</text>

  <!-- Sources -->
  <text x="600" y="795" text-anchor="middle" fill="#444444" font-family="sans-serif" font-size="10">Sources: SpaceNews · NASASpaceFlight · CNBC · SpaceWatch Global · The Wire China · SCMP</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <rect width="1200" height="800" fill="#0A0A0A"/>

  <!-- Title -->
  <text x="600" y="55" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="28" font-weight="bold">Mortgage Crisis: 2008 vs 2030 Compared</text>

  <!-- Divider -->
  <line x1="600" y1="110" x2="600" y2="720" stroke="#333333" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- LEFT: 2008 -->
  <text x="300" y="140" text-anchor="middle" fill="#2196F3" font-family="sans-serif" font-size="26" font-weight="bold">2008</text>
  <text x="300" y="165" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="14">Subprime Crisis</text>

  <rect x="80" y="200" width="440" height="55" rx="8" fill="#2196F3" fill-opacity="0.1" stroke="#2196F3" stroke-width="1"/>
  <text x="100" y="225" fill="#2196F3" font-family="sans-serif" font-size="14" font-weight="bold">Root Cause</text>
  <text x="100" y="245" fill="#888888" font-family="sans-serif" font-size="13">Bad loans from day one</text>

  <rect x="80" y="270" width="440" height="55" rx="8" fill="#2196F3" fill-opacity="0.1" stroke="#2196F3" stroke-width="1"/>
  <text x="100" y="295" fill="#2196F3" font-family="sans-serif" font-size="14" font-weight="bold">Borrowers</text>
  <text x="100" y="315" fill="#888888" font-family="sans-serif" font-size="13">Low FICO, no down payment</text>

  <rect x="80" y="340" width="440" height="55" rx="8" fill="#2196F3" fill-opacity="0.1" stroke="#2196F3" stroke-width="1"/>
  <text x="100" y="365" fill="#2196F3" font-family="sans-serif" font-size="14" font-weight="bold">Scale</text>
  <text x="100" y="385" fill="#888888" font-family="sans-serif" font-size="13">Subprime ~$1.3T</text>

  <rect x="80" y="410" width="440" height="55" rx="8" fill="#2196F3" fill-opacity="0.1" stroke="#2196F3" stroke-width="1"/>
  <text x="100" y="435" fill="#2196F3" font-family="sans-serif" font-size="14" font-weight="bold">Predictability</text>
  <text x="100" y="455" fill="#888888" font-family="sans-serif" font-size="13">Should have been foreseen</text>

  <rect x="80" y="480" width="440" height="55" rx="8" fill="#2196F3" fill-opacity="0.1" stroke="#2196F3" stroke-width="1"/>
  <text x="100" y="505" fill="#2196F3" font-family="sans-serif" font-size="14" font-weight="bold">Solution</text>
  <text x="100" y="525" fill="#888888" font-family="sans-serif" font-size="13">Rate cuts + QE + TARP → Worked</text>

  <rect x="80" y="550" width="440" height="55" rx="8" fill="#2196F3" fill-opacity="0.1" stroke="#2196F3" stroke-width="1"/>
  <text x="100" y="575" fill="#2196F3" font-family="sans-serif" font-size="14" font-weight="bold">Nature</text>
  <text x="100" y="595" fill="#888888" font-family="sans-serif" font-size="13">Broken pipe (fixable)</text>

  <!-- RIGHT: ~2030 -->
  <text x="900" y="140" text-anchor="middle" fill="#FF4444" font-family="sans-serif" font-size="26" font-weight="bold">~2030</text>
  <text x="900" y="165" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="14">AI Mortgage Crisis</text>

  <rect x="680" y="200" width="440" height="55" rx="8" fill="#FF4444" fill-opacity="0.1" stroke="#FF4444" stroke-width="1"/>
  <text x="700" y="225" fill="#FF4444" font-family="sans-serif" font-size="14" font-weight="bold">Root Cause</text>
  <text x="700" y="245" fill="#FFFFFF" font-family="sans-serif" font-size="13">Good loans turned bad (the world changed)</text>

  <rect x="680" y="270" width="440" height="55" rx="8" fill="#FF4444" fill-opacity="0.1" stroke="#FF4444" stroke-width="1"/>
  <text x="700" y="295" fill="#FF4444" font-family="sans-serif" font-size="14" font-weight="bold">Borrowers</text>
  <text x="700" y="315" fill="#FFFFFF" font-family="sans-serif" font-size="13">FICO 780, 20% down payment</text>

  <rect x="680" y="340" width="440" height="55" rx="8" fill="#FF4444" fill-opacity="0.1" stroke="#FF4444" stroke-width="1"/>
  <text x="700" y="365" fill="#FF4444" font-family="sans-serif" font-size="14" font-weight="bold">Scale</text>
  <text x="700" y="385" fill="#FFFFFF" font-family="sans-serif" font-size="13" font-weight="bold">Residential mortgages $13T</text>

  <rect x="680" y="410" width="440" height="55" rx="8" fill="#FF4444" fill-opacity="0.1" stroke="#FF4444" stroke-width="1"/>
  <text x="700" y="435" fill="#FF4444" font-family="sans-serif" font-size="14" font-weight="bold">Predictability</text>
  <text x="700" y="455" fill="#FFFFFF" font-family="sans-serif" font-size="13">Nobody saw AI coming this fast</text>

  <rect x="680" y="480" width="440" height="55" rx="8" fill="#FF4444" fill-opacity="0.1" stroke="#FF4444" stroke-width="1"/>
  <text x="700" y="505" fill="#FF4444" font-family="sans-serif" font-size="14" font-weight="bold">Solution</text>
  <text x="700" y="525" fill="#FFFFFF" font-family="sans-serif" font-size="13">Rate cuts useless (jobs are gone)</text>

  <rect x="680" y="550" width="440" height="55" rx="8" fill="#FF4444" fill-opacity="0.1" stroke="#FF4444" stroke-width="1"/>
  <text x="700" y="575" fill="#FF4444" font-family="sans-serif" font-size="14" font-weight="bold">Nature</text>
  <text x="700" y="595" fill="#FFFFFF" font-family="sans-serif" font-size="13" font-weight="bold">Water vanished (unfixable)</text>

  <!-- Bottom comparison -->
  <rect x="200" y="640" width="800" height="60" rx="10" fill="#FF9800" fill-opacity="0.1" stroke="#FF9800" stroke-width="1"/>
  <text x="600" y="668" text-anchor="middle" fill="#FF9800" font-family="sans-serif" font-size="16" font-weight="bold">Scale 10x · Better borrowers · But no fix</text>
  <text x="600" y="690" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="12">Middle-class mortgage volume dwarfs 2008 subprime</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <rect width="1200" height="800" fill="#0A0A0A"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="26" font-weight="bold">The Space Economy: One Man's Empire</text>

  <!-- LEFT: Starship Cost Revolution -->
  <text x="300" y="125" text-anchor="middle" fill="#2196F3" font-family="sans-serif" font-size="20" font-weight="bold">Launch Cost Revolution</text>

  <!-- Cost bars -->
  <text x="100" y="175" fill="#FFFFFF" font-family="sans-serif" font-size="13">Space Shuttle (2011)</text>
  <rect x="300" y="160" width="280" height="24" rx="4" fill="#FF4444" opacity="0.5"/>
  <text x="590" y="178" fill="#FF4444" font-family="sans-serif" font-size="13" font-weight="bold">$54,500/kg</text>

  <text x="100" y="210" fill="#FFFFFF" font-family="sans-serif" font-size="13">Falcon 9 (2024)</text>
  <rect x="300" y="195" width="22" height="24" rx="4" fill="#FF9800" opacity="0.7"/>
  <text x="332" y="213" fill="#FF9800" font-family="sans-serif" font-size="13" font-weight="bold">$2,720/kg</text>

  <text x="100" y="245" fill="#FFFFFF" font-family="sans-serif" font-size="13">Starship Current (2026)</text>
  <rect x="300" y="230" width="6" height="24" rx="3" fill="#2196F3" opacity="0.8"/>
  <text x="316" y="248" fill="#2196F3" font-family="sans-serif" font-size="13" font-weight="bold">$78-94/kg</text>

  <text x="100" y="280" fill="#FFFFFF" font-family="sans-serif" font-size="13">Starship Target (2030)</text>
  <rect x="300" y="265" width="2" height="24" rx="1" fill="#00BCD4" opacity="0.9"/>
  <text x="312" y="283" fill="#00BCD4" font-family="sans-serif" font-size="13" font-weight="bold">$10-20/kg</text>

  <text x="300" y="318" text-anchor="middle" fill="#FF9800" font-family="sans-serif" font-size="12" font-weight="bold">99.97% cost reduction from Shuttle to Starship target</text>
  <text x="300" y="338" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="11">Starship: 11 test flights · 150t payload · Fully reusable</text>

  <!-- RIGHT: Musk's Empire -->
  <text x="870" y="125" text-anchor="middle" fill="#FF9800" font-family="sans-serif" font-size="20" font-weight="bold">Musk's Infrastructure Empire</text>

  <rect x="640" y="150" width="460" height="200" rx="10" fill="#FF9800" fill-opacity="0.06" stroke="#FF9800" stroke-width="1"/>

  <text x="665" y="180" fill="#2196F3" font-family="sans-serif" font-size="14" font-weight="bold">SpaceX</text>
  <text x="825" y="180" fill="#888888" font-family="sans-serif" font-size="12">60%+ global launch share · $350B valuation</text>

  <text x="665" y="208" fill="#00BCD4" font-family="sans-serif" font-size="14" font-weight="bold">Starlink</text>
  <text x="825" y="208" fill="#888888" font-family="sans-serif" font-size="12">9,400+ satellites · 10M+ users · 65% of active sats</text>

  <text x="665" y="236" fill="#FF4444" font-family="sans-serif" font-size="14" font-weight="bold">xAI (Grok)</text>
  <text x="825" y="236" fill="#888888" font-family="sans-serif" font-size="12">Merged with SpaceX · Combined $1.25T</text>

  <text x="665" y="264" fill="#FF9800" font-family="sans-serif" font-size="14" font-weight="bold">Tesla</text>
  <text x="825" y="264" fill="#888888" font-family="sans-serif" font-size="12">EVs + FSD + Optimus robots</text>

  <text x="665" y="292" fill="#888888" font-family="sans-serif" font-size="14" font-weight="bold">Others</text>
  <text x="825" y="292" fill="#888888" font-family="sans-serif" font-size="12">Neuralink · Boring Company · X (Twitter)</text>

  <text x="870" y="340" text-anchor="middle" fill="#FF4444" font-family="sans-serif" font-size="12" font-weight="bold">One man controls: rockets + satellites + AI + EVs + BCI + social media</text>

  <!-- MIDDLE: Space Data Centers -->
  <text x="600" y="390" text-anchor="middle" fill="#00BCD4" font-family="sans-serif" font-size="20" font-weight="bold">Orbital Data Centers</text>

  <rect x="80" y="410" width="340" height="95" rx="8" fill="#2196F3" fill-opacity="0.06" stroke="#2196F3" stroke-width="1"/>
  <text x="100" y="438" fill="#FFFFFF" font-family="sans-serif" font-size="14" font-weight="bold">Starcloud (Lumen Orbit)</text>
  <text x="100" y="460" fill="#2196F3" font-family="sans-serif" font-size="12">Nov 2025: First H100 GPU sent to orbit</text>
  <text x="100" y="480" fill="#888888" font-family="sans-serif" font-size="11">Space cooling advantage · Unlimited solar power</text>
  <text x="100" y="498" fill="#888888" font-family="sans-serif" font-size="11">Launched via SpaceX Transporter-12</text>

  <rect x="440" y="410" width="340" height="95" rx="8" fill="#FF9800" fill-opacity="0.06" stroke="#FF9800" stroke-width="1"/>
  <text x="460" y="438" fill="#FFFFFF" font-family="sans-serif" font-size="14" font-weight="bold">Google Suncatcher</text>
  <text x="460" y="460" fill="#FF9800" font-family="sans-serif" font-size="12">2027 plan: Space solar → microwave to Earth</text>
  <text x="460" y="480" fill="#888888" font-family="sans-serif" font-size="11">Solving ground-based AI power bottleneck</text>
  <text x="460" y="498" fill="#888888" font-family="sans-serif" font-size="11">Launching with Starship</text>

  <rect x="800" y="410" width="320" height="95" rx="8" fill="#FF4444" fill-opacity="0.06" stroke="#FF4444" stroke-width="1"/>
  <text x="820" y="438" fill="#FFFFFF" font-family="sans-serif" font-size="14" font-weight="bold">SpaceX x xAI Merger</text>
  <text x="820" y="460" fill="#FF4444" font-family="sans-serif" font-size="12">Feb 2026: $1.25T merger</text>
  <text x="820" y="480" fill="#888888" font-family="sans-serif" font-size="11">Goal: Orbital AI data centers</text>
  <text x="820" y="498" fill="#888888" font-family="sans-serif" font-size="11">Rockets + AI + satellites = space compute platform</text>

  <!-- Why Space? -->
  <rect x="80" y="525" width="1040" height="70" rx="10" fill="#00BCD4" fill-opacity="0.06" stroke="#00BCD4" stroke-width="1"/>
  <text x="600" y="553" text-anchor="middle" fill="#00BCD4" font-family="sans-serif" font-size="16" font-weight="bold">Why Space Data Centers?</text>
  <text x="600" y="578" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="13">Natural cooling (no water needed) · 24/7 solar (no grid limits) · No land/environmental constraints · Solves 134GW power gap</text>

  <!-- Bottom: Historical comparison -->
  <rect x="80" y="615" width="1040" height="90" rx="12" fill="#FF4444" fill-opacity="0.08" stroke="#FF4444" stroke-width="1.5"/>
  <text x="600" y="643" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="16" font-weight="bold">Historical Analogy: Greater concentration of power than the East India Company</text>
  <text x="600" y="670" text-anchor="middle" fill="#FF9800" font-family="sans-serif" font-size="13">East India Co.: trade + army + territory. Musk: rockets + AI + global comms + energy + BCI + social media</text>

  <!-- Bottom insight -->
  <text x="600" y="745" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="14">When one man controls both the only affordable path to space and leading AI, "mayor of Earth" isn't a metaphor.</text>

  <!-- Sources -->
  <text x="600" y="795" text-anchor="middle" fill="#444444" font-family="sans-serif" font-size="10">Sources: SpaceX · TechCrunch · Payload Space · Google · Lumen Orbit · Space.com · Financial Times</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <rect width="1200" height="800" fill="#0A0A0A"/>

  <!-- Title -->
  <text x="600" y="60" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="28" font-weight="bold">Intermediary Fee Compression by Industry</text>

  <!-- Y axis -->
  <line x1="150" y1="130" x2="150" y2="680" stroke="#333333" stroke-width="1"/>
  <!-- X axis -->
  <line x1="150" y1="680" x2="1100" y2="680" stroke="#333333" stroke-width="1"/>

  <!-- Y axis labels -->
  <text x="140" y="140" text-anchor="end" fill="#888888" font-family="sans-serif" font-size="12">20%</text>
  <text x="140" y="270" text-anchor="end" fill="#888888" font-family="sans-serif" font-size="12">15%</text>
  <text x="140" y="405" text-anchor="end" fill="#888888" font-family="sans-serif" font-size="12">10%</text>
  <text x="140" y="540" text-anchor="end" fill="#888888" font-family="sans-serif" font-size="12">5%</text>
  <text x="140" y="675" text-anchor="end" fill="#888888" font-family="sans-serif" font-size="12">0%</text>
  <!-- Grid lines -->
  <line x1="150" y1="140" x2="1100" y2="140" stroke="#222222" stroke-width="1"/>
  <line x1="150" y1="270" x2="1100" y2="270" stroke="#222222" stroke-width="1"/>
  <line x1="150" y1="405" x2="1100" y2="405" stroke="#222222" stroke-width="1"/>
  <line x1="150" y1="540" x2="1100" y2="540" stroke="#222222" stroke-width="1"/>

  <!-- Bar groups: Before (cyan) / After (orange) -->
  <!-- Group 1: Travel 15% → 3% -->
  <rect x="200" y="270" width="50" height="410" rx="3" fill="#2196F3" opacity="0.8"/>
  <text x="225" y="260" text-anchor="middle" fill="#2196F3" font-family="sans-serif" font-size="13" font-weight="bold">15%</text>
  <rect x="260" y="600" width="50" height="80" rx="3" fill="#FF9800" opacity="0.8"/>
  <text x="285" y="590" text-anchor="middle" fill="#FF9800" font-family="sans-serif" font-size="13" font-weight="bold">3%</text>
  <text x="255" y="710" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="13">Travel</text>

  <!-- Group 2: Insurance 12% → 2% -->
  <rect x="380" y="356" width="50" height="324" rx="3" fill="#2196F3" opacity="0.8"/>
  <text x="405" y="346" text-anchor="middle" fill="#2196F3" font-family="sans-serif" font-size="13" font-weight="bold">12%</text>
  <rect x="440" y="626" width="50" height="54" rx="3" fill="#FF9800" opacity="0.8"/>
  <text x="465" y="616" text-anchor="middle" fill="#FF9800" font-family="sans-serif" font-size="13" font-weight="bold">2%</text>
  <text x="435" y="710" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="13">Insurance</text>

  <!-- Group 3: Legal 8% → 2% -->
  <rect x="560" y="464" width="50" height="216" rx="3" fill="#2196F3" opacity="0.8"/>
  <text x="585" y="454" text-anchor="middle" fill="#2196F3" font-family="sans-serif" font-size="13" font-weight="bold">8%</text>
  <rect x="620" y="626" width="50" height="54" rx="3" fill="#FF9800" opacity="0.8"/>
  <text x="645" y="616" text-anchor="middle" fill="#FF9800" font-family="sans-serif" font-size="13" font-weight="bold">2%</text>
  <text x="615" y="710" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="13">Legal</text>

  <!-- Group 4: Finance 5% → 1% -->
  <rect x="740" y="545" width="50" height="135" rx="3" fill="#2196F3" opacity="0.8"/>
  <text x="765" y="535" text-anchor="middle" fill="#2196F3" font-family="sans-serif" font-size="13" font-weight="bold">5%</text>
  <rect x="800" y="653" width="50" height="27" rx="3" fill="#FF9800" opacity="0.8"/>
  <text x="825" y="643" text-anchor="middle" fill="#FF9800" font-family="sans-serif" font-size="13" font-weight="bold">1%</text>
  <text x="795" y="710" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="13">Finance</text>

  <!-- Group 5: Real Estate 3% → 1% -->
  <rect x="920" y="600" width="50" height="80" rx="3" fill="#2196F3" opacity="0.8"/>
  <text x="945" y="590" text-anchor="middle" fill="#2196F3" font-family="sans-serif" font-size="13" font-weight="bold">3%</text>
  <rect x="980" y="653" width="50" height="27" rx="3" fill="#FF9800" opacity="0.8"/>
  <text x="1005" y="643" text-anchor="middle" fill="#FF9800" font-family="sans-serif" font-size="13" font-weight="bold">1%</text>
  <text x="975" y="710" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="13">Real Estate</text>

  <!-- Legend -->
  <rect x="800" y="120" width="16" height="16" fill="#2196F3" opacity="0.8"/>
  <text x="825" y="133" fill="#FFFFFF" font-family="sans-serif" font-size="13">Traditional</text>
  <rect x="800" y="145" width="16" height="16" fill="#FF9800" opacity="0.8"/>
  <text x="825" y="158" fill="#FFFFFF" font-family="sans-serif" font-size="13">AI Era</text>

  <!-- Annotation -->
  <text x="600" y="770" text-anchor="middle" fill="#FF4444" font-family="sans-serif" font-size="14">AI agents are 100% rational, brand premiums vanish</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="prodGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00BCD4" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00BCD4" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="wageGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#FF4444" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FF4444" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="#0A0A0A"/>

  <!-- Title -->
  <text x="600" y="55" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="28" font-weight="bold">"Ghost GDP" — The Scissors Gap</text>

  <!-- Axes -->
  <line x1="120" y1="650" x2="1100" y2="650" stroke="#333333" stroke-width="1"/>
  <line x1="120" y1="130" x2="120" y2="650" stroke="#333333" stroke-width="1"/>

  <!-- Y axis label -->
  <text x="40" y="400" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="13" transform="rotate(-90,40,400)">Growth Index (2020=100)</text>

  <!-- X axis labels -->
  <text x="180" y="675" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="13">2020</text>
  <text x="376" y="675" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="13">2023</text>
  <text x="570" y="675" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="13">2025</text>
  <text x="770" y="675" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="13">2027</text>
  <text x="960" y="675" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="13">2030</text>

  <!-- Y axis ticks -->
  <text x="110" y="650" text-anchor="end" fill="#888888" font-family="sans-serif" font-size="12">100</text>
  <text x="110" y="520" text-anchor="end" fill="#888888" font-family="sans-serif" font-size="12">150</text>
  <text x="110" y="390" text-anchor="end" fill="#888888" font-family="sans-serif" font-size="12">200</text>
  <text x="110" y="260" text-anchor="end" fill="#888888" font-family="sans-serif" font-size="12">250</text>
  <text x="110" y="130" text-anchor="end" fill="#888888" font-family="sans-serif" font-size="12">300</text>
  <!-- Grid -->
  <line x1="120" y1="520" x2="1100" y2="520" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="120" y1="390" x2="1100" y2="390" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="120" y1="260" x2="1100" y2="260" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Productivity line (surging up) -->
  <polyline points="180,645 376,580 570,450 770,280 960,140" stroke="#00BCD4" stroke-width="3" fill="none"/>
  <!-- Area under productivity -->
  <polygon points="180,645 376,580 570,450 770,280 960,140 960,650 180,650" fill="url(#prodGrad)"/>
  <!-- Dots -->
  <circle cx="180" cy="645" r="5" fill="#00BCD4"/>
  <circle cx="376" cy="580" r="5" fill="#00BCD4"/>
  <circle cx="570" cy="450" r="5" fill="#00BCD4"/>
  <circle cx="770" cy="280" r="5" fill="#00BCD4"/>
  <circle cx="960" cy="140" r="5" fill="#00BCD4"/>

  <!-- Nominal wage line (stagnant then declining) -->
  <polyline points="180,645 376,630 570,625 770,640 960,660" stroke="#FF4444" stroke-width="3" fill="none"/>
  <!-- Area under wage -->
  <polygon points="180,645 376,630 570,625 770,640 960,660 960,650 180,650" fill="url(#wageGrad)"/>
  <!-- Dots -->
  <circle cx="180" cy="645" r="5" fill="#FF4444"/>
  <circle cx="376" cy="630" r="5" fill="#FF4444"/>
  <circle cx="570" cy="625" r="5" fill="#FF4444"/>
  <circle cx="770" cy="640" r="5" fill="#FF4444"/>
  <circle cx="960" cy="660" r="5" fill="#FF4444"/>

  <!-- Labels -->
  <text x="980" y="135" fill="#00BCD4" font-family="sans-serif" font-size="15" font-weight="bold">Productivity</text>
  <text x="980" y="660" fill="#FF4444" font-family="sans-serif" font-size="15" font-weight="bold">Nominal Wages</text>

  <!-- Scissors gap annotation -->
  <line x1="770" y1="280" x2="770" y2="640" stroke="#FF9800" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="790" y="460" fill="#FF9800" font-family="sans-serif" font-size="16" font-weight="bold">Scissors Gap</text>

  <!-- Bottom annotation -->
  <text x="600" y="740" text-anchor="middle" fill="#888888" font-family="sans-serif" font-size="14">Machines don't buy things — US economy is 70% consumer-driven</text>
</svg>